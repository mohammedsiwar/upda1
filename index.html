<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KFC Store 1416 — Complete Schedule Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --bg:#f4f7fb;
  --surface:#ffffff;
  --surface-2:#f8fafc;
  --text:#0f172a;
  --muted:#64748b;
  --brand:#e11d48;
  --brand-2:#be123c;
  --line:#e2e8f0;
  --shadow:0 10px 30px rgba(15,23,42,.08);
  --radius:24px;
}
body.dark{
  --bg:#020617;
  --surface:#0f172a;
  --surface-2:#111827;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --brand:#fb7185;
  --brand-2:#e11d48;
  --line:rgba(255,255,255,.12);
  --shadow:0 14px 40px rgba(0,0,0,.35);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;overflow-x:hidden}
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg, var(--bg), #e2e8f0);
  color:var(--text);
  -webkit-text-size-adjust:100%;
  transition:background .25s, color .25s;
}
button,input,select,textarea{font:inherit}
a{color:inherit}
img,svg,canvas{max-width:100%;height:auto}

#splash{
  position:fixed; inset:0;
  background:radial-gradient(circle at 20% 20%, #1e293b, #020617 70%);
  z-index:10000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
  transition:opacity .4s ease;
}
#splash.hide{opacity:0;pointer-events:none}
.splash-badge{
  background:var(--brand);
  padding:14px 28px;
  border-radius:999px;
  color:white;
  font-weight:800;
  font-size:clamp(1.5rem, 4vw, 2.2rem);
  box-shadow:0 20px 35px -10px rgba(0,0,0,.6);
}
.splash-spin{
  width:36px;height:36px;
  border:3px solid rgba(255,255,255,.2);
  border-top-color:var(--brand);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

#loginWrap{
  display:none;
  align-items:center;
  justify-content:center;
  min-height:100dvh;
  background:radial-gradient(circle at top, #0f172a, #020617 70%);
  padding:16px;
}
#loginWrap.on{display:flex}
.login-card{
  width:min(100%, 420px);
  background:rgba(255,255,255,.98);
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 24px 60px rgba(0,0,0,.35);
}
body.dark .login-card{background:rgba(15,23,42,.96); color:var(--text)}
.login-header{
  background:linear-gradient(135deg, var(--brand), #fb7185);
  padding:24px;
  color:white;
}
.login-badge{
  background:white;
  color:var(--brand);
  font-weight:800;
  display:inline-block;
  padding:6px 14px;
  border-radius:999px;
  font-size:.78rem;
  margin-bottom:14px;
}
.login-title{
  font-size:clamp(1.5rem, 4vw, 1.9rem);
  font-weight:800;
  letter-spacing:-.02em;
  line-height:1.15;
}
.login-body{padding:24px}

.input-field{
  width:100%;
  padding:13px 16px;
  border:1.5px solid var(--line);
  border-radius:18px;
  font-size:16px;
  outline:none;
  transition:.2s;
  background:var(--surface);
  color:var(--text);
}
.input-field:focus{
  border-color:var(--brand);
  box-shadow:0 0 0 4px rgba(225,29,72,.12);
}

.btn-primary{
  background:linear-gradient(135deg, var(--brand), #fb7185);
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:999px;
  font-weight:800;
  cursor:pointer;
  width:100%;
  font-size:.95rem;
  box-shadow:0 10px 20px rgba(225,29,72,.18);
}
.btn-outline{
  background:transparent;
  border:1.5px solid #cbd5e1;
  border-radius:999px;
  padding:9px 14px;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
  color:var(--text);
}
.btn-primary:hover,.btn-outline:hover{transform:translateY(-1px)}
.btn-outline:hover{border-color:var(--brand);color:var(--brand)}

.app-header{
  background:linear-gradient(135deg, #0f172a, #111827);
  color:white;
  padding:14px 16px;
  min-height:64px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  position:sticky;
  top:0;
  z-index:100;
  flex-wrap:wrap;
}
.tabs-container{
  background:var(--surface);
  border-bottom:1px solid var(--line);
  display:flex;
  gap:4px;
  padding:0 10px;
  overflow-x:auto;
  position:sticky;
  top:64px;
  z-index:90;
  scrollbar-width:none;
}
.tabs-container::-webkit-scrollbar{display:none}
.tab{
  padding:14px 14px;
  font-weight:700;
  background:none;
  border:none;
  color:var(--muted);
  cursor:pointer;
  border-bottom:3px solid transparent;
  white-space:nowrap;
  flex:0 0 auto;
}
.tab.on{color:var(--brand);border-bottom-color:var(--brand)}

.page{
  display:none;
  padding:16px;
  max-width:1400px;
  margin:0 auto;
}
.page.on{display:block}
.card-modern{
  background:var(--surface);
  border-radius:var(--radius);
  border:1px solid var(--line);
  padding:16px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
}

.team-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
  gap:14px;
}
.employee-card{
  background:var(--surface);
  border-radius:24px;
  border:1px solid var(--line);
  padding:16px;
  box-shadow:var(--shadow);
}
.avatar{
  width:48px;
  height:48px;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  color:white;
}
.badge-role{
  font-size:.72rem;
  font-weight:800;
  padding:5px 10px;
  border-radius:999px;
  background:var(--surface-2);
  display:inline-block;
  margin-top:6px;
}
.pin-chip{
  font-family:monospace;
  background:var(--surface-2);
  padding:5px 10px;
  border-radius:999px;
  font-size:.78rem;
  margin-top:8px;
  display:inline-block;
}

.section-title{
  font-size:1.05rem;
  font-weight:800;
  margin-bottom:12px;
}

.availability-card{
  background:var(--surface);
  border-radius:24px;
  border:1px solid var(--line);
  margin-bottom:16px;
  overflow:hidden;
  box-shadow:var(--shadow);
}
.av-table{
  width:100%;
  border-collapse:collapse;
  font-size:.78rem;
}
.av-table th,.av-table td{
  padding:10px 6px;
  border-bottom:1px solid var(--line);
  vertical-align:middle;
}
.av-table th{
  background:var(--surface-2);
  font-weight:700;
}
.toggle-btn{
  width:34px;
  height:34px;
  border-radius:12px;
  border:1.5px solid #cbd5e1;
  background:var(--surface);
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
}
.toggle-btn.on{
  background:#dcfce7;
  border-color:#22c55e;
  color:#15803d;
}
.time-input{
  width:100%;
  min-width:86px;
  padding:7px 8px;
  border-radius:14px;
  border:1px solid var(--line);
  font-family:monospace;
  text-align:center;
  font-size:14px;
  background:var(--surface);
  color:var(--text);
}

.schedule-wrapper{
  background:var(--surface);
  border-radius:24px;
  border:1px solid var(--line);
  overflow-x:auto;
  box-shadow:var(--shadow);
}
.schedule-table{
  width:100%;
  border-collapse:collapse;
  min-width:900px;
}
.schedule-table th{
  background:#0f172a;
  color:white;
  padding:12px 8px;
  font-size:.75rem;
  text-align:center;
}
.schedule-table td{
  padding:11px 8px;
  border-bottom:1px solid var(--line);
  font-size:.84rem;
}
.shift-badge{
  background:#eef2ff;
  padding:5px 8px;
  border-radius:999px;
  font-size:.7rem;
  white-space:nowrap;
  display:inline-block;
}

.inventory-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
  gap:16px;
}
.inventory-card h3{
  margin-bottom:10px;
  text-transform:uppercase;
  letter-spacing:.04em;
  font-size:1rem;
}
.inv-row{
  display:grid;
  grid-template-columns:minmax(120px,1fr) 96px 96px;
  gap:10px;
  align-items:center;
  margin-top:10px;
}
.inv-row span{font-weight:600;font-size:.92rem}

#empPortal{
  display:none;
  min-height:100dvh;
  background:radial-gradient(circle at 20% 20%, #0c0f1c, #020617);
}
#empPortal.on{display:block}
.portal-header{
  background:rgba(225,29,72,.95);
  backdrop-filter:blur(12px);
  padding:14px 16px;
  display:flex;
  align-items:center;
  gap:12px;
  color:white;
  flex-wrap:wrap;
}
.portal-card{
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(14px);
  border-radius:28px;
  border:1px solid rgba(255,255,255,.12);
  padding:18px;
  margin-bottom:16px;
}
.day-card{
  background:rgba(255,255,255,.04);
  border-radius:20px;
  margin-bottom:10px;
  padding:12px;
}
.pin-dot{
  width:14px;
  height:14px;
  border-radius:50%;
  background:rgba(255,255,255,.3);
}
.pin-dot.filled{background:var(--brand);box-shadow:0 0 8px var(--brand)}
.pin-pad{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:10px;
  margin-top:14px;
}
.pin-key{
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);
  border-radius:20px;
  padding:14px;
  text-align:center;
  font-weight:800;
  font-size:1.2rem;
  cursor:pointer;
  user-select:none;
  color:white;
}
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  left:20px;
  max-width:420px;
  margin-left:auto;
  background:#1e293b;
  color:white;
  padding:12px 18px;
  border-radius:999px;
  font-weight:700;
  z-index:9999;
  display:flex;
  align-items:center;
  gap:8px;
  animation:slideUp .25s;
}
.toast.ok{background:#15803d}
.toast.er{background:#e11d48}
@keyframes slideUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

.modal-glass{
  background:var(--surface);
  border-radius:28px;
  max-width:760px;
  width:min(94vw, 760px);
  margin:auto;
  overflow:hidden;
  max-height:92vh;
  display:flex;
  flex-direction:column;
}
.modal-scroll{
  overflow:auto;
  -webkit-overflow-scrolling:touch;
}
@media (max-width: 900px){
  .page{padding:12px}
  .team-grid{grid-template-columns:1fr}
  .app-header{padding:12px}
  .tabs-container{padding:0 8px}
  .tab{padding:12px 12px}
  .schedule-table{min-width:820px}
  .inventory-grid{grid-template-columns:1fr}
}
@media (max-width: 640px){
  .login-body{padding:18px}
  .card-modern,.employee-card,.availability-card{border-radius:20px}
  .avatar{width:44px;height:44px;border-radius:14px}
  .btn-primary,.btn-outline{width:100%}
  .toast{right:12px;left:12px}
  .portal-header{padding:12px}
  .pin-key{padding:12px;font-size:1.1rem}
  .av-table{font-size:.72rem}
  .inv-row{grid-template-columns:1fr 1fr 1fr}
}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-badge">KFC 1416</div>
  <div class="splash-spin"></div>
</div>

<div id="loginWrap">
  <div class="login-card">
    <div class="login-header">
      <div class="login-badge">KFC</div>
      <div class="login-title">Store 1416<br>Schedule Hub</div>
    </div>
    <div class="login-body" id="loginBody"></div>
  </div>
</div>

<div id="empPortal">
  <div class="portal-header">
    <i class="fas fa-drumstick-bite"></i>
    <div style="font-weight:800;">KFC Store 1416 — Staff Portal</div>
    <button style="margin-left:auto; background:rgba(255,255,255,0.2); border:none; padding:8px 14px; border-radius:999px; color:white; cursor:pointer;" onclick="doSignOut()">Exit</button>
  </div>
  <div class="ep-body" id="epBody" style="max-width:680px; margin:20px auto; padding:0 12px;"></div>
</div>

<div id="managerApp" style="display:none;">
  <div class="app-header">
    <div><i class="fas fa-store"></i> KFC 1416 · Schedule Builder</div>
    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-left:auto;">
      <button class="btn-outline" style="color:white; border-color:#475569; width:auto;" onclick="toggleTheme()">
        <i class="fas fa-moon"></i> Theme
      </button>
      <button class="btn-outline" style="color:white; border-color:#475569; width:auto;" onclick="doSignOut()">
        <i class="fas fa-sign-out-alt"></i> Exit
      </button>
    </div>
  </div>

  <div class="tabs-container">
    <button class="tab on" onclick="go('team')"><i class="fas fa-users"></i> Team</button>
    <button class="tab" onclick="go('avail')"><i class="fas fa-calendar-alt"></i> Availability</button>
    <button class="tab" onclick="go('share')"><i class="fas fa-share-alt"></i> Share Link</button>
    <button class="tab" onclick="go('sched')"><i class="fas fa-chalkboard-user"></i> Schedule</button>
    <button class="tab" onclick="go('inv')"><i class="fas fa-boxes"></i> Inventory</button>
    <button class="tab" onclick="go('users')"><i class="fas fa-id-card"></i> Users & PINs</button>
    <button class="tab" onclick="go('import')"><i class="fas fa-file-import"></i> Import</button>
  </div>

  <div class="page on" id="pg-team">
    <div style="display:flex; justify-content:flex-end; margin-bottom:16px;">
      <button class="btn-primary" style="width:auto; padding:10px 18px;" onclick="openAdd()">
        <i class="fas fa-plus"></i> Add Employee
      </button>
    </div>
    <div class="team-grid" id="teamGrid"></div>
  </div>

  <div class="page" id="pg-avail">
    <div class="card-modern" style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
      <label style="font-weight:700;">Week starting Monday:</label>
      <input type="date" id="wkStart" class="input-field" style="width:auto; min-width:180px;" onchange="onWkChange()">
    </div>
    <div id="availList"></div>
  </div>

  <div class="page" id="pg-share">
    <div class="card-modern" id="shareLinkBox"></div>
    <div id="shareList"></div>
  </div>

  <div class="page" id="pg-sched">
    <div class="schedule-wrapper" id="schedOut"></div>
    <div style="margin-top:16px; text-align:right;">
      <button class="btn-primary" style="width:auto; padding:10px 18px;" onclick="exportPDF()">
        <i class="fas fa-file-pdf"></i> Export PDF
      </button>
    </div>
  </div>

  <div class="page" id="pg-inv">
    <div id="invContent"></div>
    <div style="margin-top:16px;">
      <button class="btn-primary" onclick="saveInventory()">Save Inventory</button>
    </div>
  </div>

  <div class="page" id="pg-users">
    <div style="display:flex; justify-content:flex-end; margin-bottom:16px;">
      <button class="btn-primary" style="width:auto;" onclick="openCreateUser()">
        <i class="fas fa-user-plus"></i> Add Staff PIN
      </button>
    </div>
    <div id="userList"></div>
  </div>

  <div class="page" id="pg-import">
    <div class="card-modern">
      <div class="section-title">Paste Word text to detect missing employees</div>
      <textarea id="importText" class="input-field" style="min-height:220px; resize:vertical;" placeholder="Paste the merged Word text here..."></textarea>
      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:12px;">
        <button class="btn-primary" style="width:auto;" onclick="autoDetectEmployees()">Detect Employees</button>
        <button class="btn-outline" style="width:auto;" onclick="fillInventoryFromText()">Fill Inventory From Text</button>
      </div>
      <div id="importResult" style="margin-top:16px;"></div>
    </div>
  </div>
</div>

<div class="ov" id="editOv" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(6px); align-items:center; justify-content:center; z-index:1000; padding:12px;">
  <div class="modal-glass">
    <div style="background:#0f172a; color:white; padding:16px 18px; display:flex; justify-content:space-between; align-items:center; gap:12px;">
      <span id="mdlTitle" style="font-weight:800;">Edit Employee</span>
      <button onclick="closeEdit()" style="background:none; border:none; color:white; font-size:1.6rem; cursor:pointer;">&times;</button>
    </div>
    <div class="modal-scroll">
      <div class="mdl-bd" style="padding:18px;">
        <div id="dayRows"></div>
        <div style="margin-top:18px; background:var(--surface-2); padding:12px; border-radius:18px; text-align:center; font-weight:800;">
          Total hours: <span id="wkTotal">0</span>h
        </div>
      </div>
    </div>
    <div style="padding:16px 18px; display:flex; flex-wrap:wrap; justify-content:flex-end; gap:10px; border-top:1px solid var(--line);">
      <button class="btn-outline" onclick="closeEdit()">Cancel</button>
      <button class="btn-primary" style="width:auto;" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<div class="ov" id="createUserOv" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; z-index:1000; padding:12px;">
  <div class="modal-glass" style="max-width:460px;">
    <div style="background:#e11d48; color:white; padding:18px; font-weight:800;">
      Add Staff PIN Access
    </div>
    <div style="padding:20px;">
      <input type="text" id="cuName" placeholder="Full name (exact as employee)" class="input-field">
      <input type="text" id="cuPin" maxlength="4" placeholder="4-digit PIN" class="input-field" style="margin-top:12px;">
      <div id="cuErr" style="color:#e11d48; font-size:.85rem; margin-top:8px;"></div>
    </div>
    <div style="padding:16px 20px; display:flex; flex-wrap:wrap; justify-content:flex-end; gap:10px; border-top:1px solid var(--line);">
      <button class="btn-outline" onclick="closeCreateUser()">Cancel</button>
      <button class="btn-primary" style="width:auto;" onclick="createUser()">Create</button>
    </div>
  </div>
</div>

<script>
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const POSITIONS = ['Assistant General Manager','Customer Service Team Member','Food Service Team Member','Shift Manager','Shift Manager in Training'];
const COLORS = ['#e11d48','#2563eb','#16a34a','#ea580c','#9333ea','#0891b2','#db2777','#4b5563','#0f766e','#be185d'];

let D = {
  employees: [],
  week: { start: getMondayStr(), period:'', year:'2026' },
  settings: { num:'1416', name:'KFC' },
  inventory: {},
  users: [],
  notifications: []
};

function getMondayStr(){
  let d=new Date();
  let day=d.getDay();
  let diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff);
  return d.toISOString().split('T')[0];
}
function blankAvail(){ return DAYS.map(()=>({on:false,s:'09:00',e:'17:00'})); }
function fixAvail(e){ if(!e.avail || e.avail.length!==7) e.avail=blankAvail(); }
function calcH(s,e){ let [sh,sm]=s.split(':'), [eh,em]=e.split(':'); let total=(eh*60+em)-(sh*60+sm); if(total<0) total+=1440; return Math.round(total/60*100)/100; }
function f12(t){ if(!t) return '—'; let [h,m]=t.split(':'); h=+h; return `${h%12||12}:${m} ${h<12?'A':'P'}`; }
function toast(msg,type='ok'){
  let t=document.createElement('div');
  t.className=`toast ${type}`;
  t.innerHTML=`<i class="fas ${type==='ok'?'fa-check-circle':'fa-exclamation-triangle'}"></i> ${msg}`;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2700);
}
function saveLocal(){ localStorage.setItem('kfc1416_complete',JSON.stringify(D)); }

function seed(){
  D.employees = [
    ['Bouhoula, Mohamed Hedi','Assistant General Manager',COLORS[0]],
    ['Adedunye, Damilola Priscilla','Customer Service Team Member',COLORS[1]],
    ['Appidi, Nandakishore','Customer Service Team Member',COLORS[2]],
    ['Hashim, Agil','Customer Service Team Member',COLORS[3]],
    ['Legault-Agil, Alyza','Customer Service Team Member',COLORS[4]],
    ['Aghwach, Adam','Food Service Team Member',COLORS[5]],
    ['Belarbi, Anes Abdelmalek','Food Service Team Member',COLORS[6]],
    ['Shaheen, Ghazala','Shift Manager',COLORS[7]],
    ['Tiwari, Balveer','Shift Manager',COLORS[0]],
    ['Gilotra, Arjun','Shift Manager in Training',COLORS[1]],

function loadLocal(){
  let raw=localStorage.getItem('kfc1416_complete');
  if(raw){
    try{
      let p=JSON.parse(raw);
      D={...D,...p};
      D.employees=D.employees||[];
      D.users=D.users||[];
      D.inventory=D.inventory||{};
      D.employees.forEach(fixAvail);
      if(!D.employees.length) seed();
    }catch(e){ seed(); }
  }else seed();
}

function getWeekDates(){
  let s=new Date(D.week.start+'T00:00:00');
  return DAYS.map((_,i)=>{
    let d=new Date(s);
    d.setDate(d.getDate()+i);
    return `${d.getMonth()+1}/${d.getDate()}`;
  });
}

function getSubKey(empId){ return `staff_sub_${empId}_${D.week.start}`; }
function saveSubmission(empId,data){ localStorage.setItem(getSubKey(empId),JSON.stringify(data)); }
function loadSubmission(empId){ let raw=localStorage.getItem(getSubKey(empId)); return raw?JSON.parse(raw):null; }
function getAllSubmissions(){ let subs={}; D.employees.forEach(e=>{ let s=loadSubmission(e.id); if(s) subs[e.id]=s; }); return subs; }
function addNotif(name){ D.notifications.unshift({id:Date.now(),empName:name,read:false}); if(D.notifications.length>40) D.notifications.pop(); saveLocal(); }

function buildSched(){
  let out=document.getElementById('schedOut');
  let dates=getWeekDates();
  if(!D.employees.length){ out.innerHTML='<div class="card-modern">No employees</div>'; return; }
  let rows='', grand=0;
  D.employees.forEach(emp=>{
    fixAvail(emp);
    let wk=0;
    let cells=emp.avail.map(av=>{
      if(av.on){
        let h=calcH(av.s,av.e); wk+=h;
        return `<td style="text-align:center;"><span class="shift-badge">${f12(av.s)}–${f12(av.e)}</span></td>`;
      }
      return `<td style="text-align:center;color:#cbd5e1;">—</td>`;
    }).join('');
    grand+=wk;
    rows+=`<tr><td style="font-weight:700; white-space:nowrap;">${emp.name}</td>${cells}<td style="font-weight:800; text-align:center;">${wk.toFixed(1)}</td></tr>`;
  });
  out.innerHTML=`<table class="schedule-table">
    <thead>
      <tr><th>Staff</th>${DAYS.map((d,i)=>`<th>${d}<br><span style="font-size:9px;color:#cbd5e1;">${dates[i]}</span></th>`).join('')}<th>Total</th></tr>

    <tbody>${rows}</tbody>
    <tfoot>
      <tr style="background:var(--surface-2);"><td colspan="8"><b>Total store hours</b></td><td style="text-align:center;"><b>${grand.toFixed(1)}</b></td></tr>
    </tfoot>
  </table>`;
}

function createUser(){
  let name=document.getElementById('cuName').value.trim();
  let pin=document.getElementById('cuPin').value.trim();
  let errDiv=document.getElementById('cuErr');
  if(!name || !pin || pin.length!==4 || !/^\d{4}$/.test(pin)){ errDiv.innerText='Valid name and 4-digit PIN required.'; return; }
  if(!D.employees.find(e=>e.name===name)){ errDiv.innerText=`Employee "${name}" not found in team.`; return; }
  if(D.users.find(u=>u.name===name)){ errDiv.innerText='User already exists.'; return; }
  D.users.push({name,pin,role:'staff'});
  saveLocal();
  closeCreateUser();
  renderUsers();
  renderTeam();
  toast(`PIN created for ${name}`,'ok');
}

function exportPDF(){
  if(!window.jspdf || !window.jspdf.jsPDF){ toast('PDF library unavailable','er'); return; }
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape', unit:'pt', format:'a4'});
  const dates=getWeekDates();
  const head=[['Staff',...DAYS.map((d,i)=>`${d} ${dates[i]}`),'Total']];
  const body=D.employees.map(emp=>{
    let wk=0;
    let row=[emp.name];
    emp.avail.forEach(av=>{
      if(av.on){ row.push(`${f12(av.s)}–${f12(av.e)}`); wk+=calcH(av.s,av.e); }
      else row.push('—');
    });
    row.push(wk.toFixed(1));
    return row;
  });
  doc.setFontSize(16);
  doc.text(`KFC Store ${D.settings.num||'1416'} Schedule`, 40, 34);
  doc.autoTable({
    head,
    body,
    startY: 52,
    theme: 'grid',
    styles: { fontSize: 8, cellPadding: 4, overflow: 'linebreak' },
    headStyles: { fillColor:[15,23,42], textColor:[255,255,255] },
    alternateRowStyles: { fillColor:[248,250,252] },
    columnStyles: { 0:{cellWidth:140} }
  });
  doc.save(`KFC_${D.settings.num||'1416'}_Schedule.pdf`);
  toast('PDF exported','ok');
}

    if(errDiv) errDiv.innerText='Invalid PIN. Try again.';
    staffPinInput='';
    updatePinDotsUI();

          ${av.on?`<span style="margin-left:auto; color:#86efac; font-weight:700;">${hrs.toFixed(1)}h</span>`:'<span style="margin-left:auto; color:#64748b;">Off</span>'}
        </div>
        ${av.on?`<div style="margin-top:12px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
          <input type="time" value="${av.s}" onchange="epTimeUpdate(${i},'s',this.value)" class="time-input" style="background:rgba(255,255,255,0.1); color:white; border-color:rgba(255,255,255,0.15);">

        </div>`:''}
      </div>`;
    }).join('')}
    <div style="margin-top:20px; text-align:center; background:rgba(255,255,255,0.05); border-radius:999px; padding:12px; color:white;">
      Total: <span id="epTotalStaff">${window.epStaffAvail.reduce((s,d)=>s+(d.on?calcH(d.s,d.e):0),0).toFixed(1)}h</span>
    </div>
    <button class="btn-primary" style="margin-top:20px;" onclick="submitStaffFinal()">Submit Availability</button>
  </div>`;
  body.innerHTML=html;
}

function parseEmployeeNames(text){
  const patterns = [
    /([A-Z][a-z]+(?:[-\s][A-Z][a-z]+)*,\s*[A-Z][a-z]+(?:\s[A-Z][a-z]+)*)/g,
    /([A-Z][a-z]+,\s*[A-Z][a-z]+(?:\s[A-Z][a-z]+)*)/g
  ];
  let found = new Set();
  patterns.forEach(r => {
    let m;
    while((m=r.exec(text))!==null) found.add(m[1].trim());
  });
  return [...found];
}

function autoDetectEmployees(){
  const text=document.getElementById('importText').value || '';
  const names=parseEmployeeNames(text);
  const existing=new Set(D.employees.map(e=>e.name));
  let added=[];
  names.forEach(name=>{
    if(!existing.has(name)){
      D.employees.push({
        id:'e'+Date.now()+Math.floor(Math.random()*1000),
        name,
        position:'Customer Service Team Member',
        station:'',
        color:COLORS[Math.floor(Math.random()*COLORS.length)],
        avail:blankAvail()
      });
      added.push(name);
    }
  });
  saveLocal();
  renderTeam();
  renderAvail();
  renderShare();
  buildSched();
  document.getElementById('importResult').innerHTML = added.length
    ? `<div class="card-modern">Added: <b>${added.join(', ')}</b></div>`
    : `<div class="card-modern">No new employees detected.</div>`;
}
