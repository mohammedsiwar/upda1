/* ─────────────────────────────────────────────────────────────
   SMART WEEK ASSIGNMENT
   Rules:
   - Sat/Sun → family
   - off_gym         → gym_off (full gym, no shift)
   - night_gym       → kfc_gym (gym 18–20 before night shift)
   - morning_gym / afternoon_gym → gym_before_shift
   - babysitting     → babysitting
   - night (no gym)  → kfc_gym if a gym slot is needed, else kfc
   - morning/afternoon/double → kfc
   - pure off        → active or home (alternating)
   - 2 gym days auto-assigned on best off/gym days
───────────────────────────────────────────────────────────── */
function assignWeek(shifts) {
  const res = Array(7).fill(null);
  res[5] = "family"; res[6] = "family";

  // First pass: assign explicitly requested plans Mon–Fri
  for (let i = 0; i < 5; i++) {
    const s = shifts[i];
    if (s === "off_gym")         res[i] = "gym_off";
    else if (s === "night_gym")  res[i] = "kfc_gym";
    else if (s === "morning_gym" || s === "afternoon_gym") res[i] = "gym_before_shift";
    else if (s === "babysitting") res[i] = "babysitting";
    else if (s === "double")     res[i] = "kfc";
  }

  // Count how many gym days are already assigned
  let gymCount = res.filter(r => r === "gym_off" || r === "kfc_gym" || r === "gym_before_shift").length;

  // Try to auto-assign 2 gym days on plain "off" or "night" days if not enough gym days
  if (gymCount < 2) {
    const candidates = [];
    for (let i = 0; i < 5; i++) {
      if (res[i] !== null) continue; // already assigned
      const s = shifts[i];
      if (s === "off" || s === "night") candidates.push(i);
    }
    let g1 = -1, g2 = -1;
    // pick 2 candidates at least 2 days apart
    for (let ci = 0; ci < candidates.length; ci++) {
      if (g1 === -1) { g1 = candidates[ci]; continue; }
      if (g2 === -1 && candidates[ci] - g1 >= 2) { g2 = candidates[ci]; break; }
    }
    if (g1 === -1 && candidates.length > 0) g1 = candidates[0];
    if (g2 === -1 && candidates.length > 1) g2 = candidates[candidates.length - 1];

    if (gymCount === 0) {
      if (g1 !== -1) { res[g1] = shifts[g1] === "night" ? "kfc_gym" : "gym1"; gymCount++; }
      if (g2 !== -1) { res[g2] = shifts[g2] === "night" ? "kfc_gym" : "gym2"; gymCount++; }
    } else if (gymCount === 1) {
      // Only need one more
      const used = g1 !== -1 && res[g1] === null ? g1 : g2;
      if (used !== -1) res[used] = shifts[used] === "night" ? "kfc_gym" : "gym2";
    }
  }

  // Second pass: fill remaining unassigned Mon–Fri
  let altCount = 0;
  for (let i = 0; i < 5; i++) {
    if (res[i] !== null) continue;
    const s = shifts[i];
    if (s === "night")     res[i] = "kfc";
    else if (s !== "off")  res[i] = "kfc";
    else { res[i] = altCount % 2 === 0 ? "active" : "home"; altCount++; }
  }

  return res;
}

function getWeekDates(n) {
  const now=new Date(),day=now.getDay(),mon=new Date(now);
  mon.setDate(now.getDate()-(day===0?6:day-1)+(n-1)*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function fmtDate(d){return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short"});}
function fmtElapsed(s){
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(h>0) return `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
  return `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}

        {/* ══ TODAY ══ */}

                        </div>
                      </>

                </button>
              </>
            ):(
              <>
                {[["Full Name","name","text"],["Age","age","number"],["Weight (kg)","weight","number"],["Height (cm)","height","number"],["Target","target","text"]].map(([lb,k,t])=>(

                  </div>
                ))}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginTop:6}}>
                  <button onClick={()=>setEditProf(false)} style={{padding:"11px",background:"#1a1a1a",border:"1px solid #333",borderRadius:10,color:"#aaa",fontFamily:FD,fontSize:15,cursor:"pointer"}}>CANCEL</button>
                  <button onClick={saveProf} style={{padding:"11px",background:`linear-gradient(135deg,${C.accent},#8ba832)`,border:"none",borderRadius:10,color:"#000",fontFamily:FD,fontSize:15,cursor:"pointer",fontWeight:700}}>SAVE</button>
                </div>
              </>
            )}
          </div>
        )}

        {/* BOTTOM NAV */}
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#0d0d0d",borderTop:`1px solid ${C.border}`,display:"flex"}}>
          {[["today","⚡","TODAY"],["schedule","📅","SCHED"],["plan","💪","PLAN"],["progress","📊","PROG"],["profile","👤","ME"]].map(([k,ic,lb])=>(
            <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"8px 4px",background:"none",border:"none",color:tab===k?C.accent:C.dim,cursor:"pointer",borderTop:`2px solid ${tab===k?C.accent:"transparent"}`}}>
              <div style={{fontSize:15}}>{ic}</div>
              <div style={{fontSize:8,letterSpacing:1,marginTop:1}}>{lb}</div>
            </button>
          ))}
        </div>

        {/* MISSED MODAL */}
        {missedModal!==null&&(
          <div style={{position:"fixed",inset:0,background:"#000b",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100}}>
            <div style={{width:"100%",maxWidth:480,background:"#141414",borderRadius:"18px 18px 0 0",padding:20,border:"1px solid #2a2a2a"}}>
              <div style={{fontFamily:FD,fontSize:19,color:"#f87171",letterSpacing:2,marginBottom:3}}>LOG MISSED</div>
              <div style={{fontSize:11,color:C.muted,marginBottom:11}}>{DAYS_FULL[missedModal]}</div>
              <textarea value={missedNote} onChange={e=>setMissedNote(e.target.value)} placeholder="Why? (optional)"
                style={{width:"100%",background:"#1a1a1a",border:"1px solid #333",borderRadius:9,color:"#fff",padding:10,fontSize:12,minHeight:64,resize:"none"}}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginTop:9}}>
                <button onClick={()=>setMissedModal(null)} style={{padding:"11px",background:"#1a1a1a",border:"1px solid #333",borderRadius:9,color:"#aaa",fontFamily:FD,fontSize:14,cursor:"pointer"}}>CANCEL</button>
                <button onClick={()=>logMissed(missedModal,missedNote)} style={{padding:"11px",background:"#f8717122",border:"1px solid #f87171",borderRadius:9,color:"#f87171",fontFamily:FD,fontSize:14,cursor:"pointer"}}>LOG IT</button>
              </div>
            </div>
          </div>
        )}

        {/* TOAST */}
        {toast&&(
          <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:toast.color,color:"#000",padding:"8px 18px",borderRadius:26,fontFamily:FD,fontSize:14,letterSpacing:1,zIndex:9999,fontWeight:700,whiteSpace:"nowrap"}}>
            {toast.msg}
          </div>
        )}
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<MoeFitness />);
  </script>
</body>
</html>
