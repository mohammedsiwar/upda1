<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes" />
<title>KFC Store 1416 — Persistent Staff Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
:root{
  --bg:#f4f7fb; --surface:#ffffff; --surface-2:#f8fafc; --text:#0f172a;
  --muted:#64748b; --brand:#e11d48; --brand-2:#be123c; --line:#e2e8f0;
  --shadow:0 10px 30px rgba(15,23,42,.08); --radius:24px;
}
body.dark{
  --bg:#020617; --surface:#0f172a; --surface-2:#111827; --text:#e5e7eb;
  --muted:#94a3b8; --brand:#fb7185; --brand-2:#e11d48; --line:rgba(255,255,255,.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{ font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); transition: background 0.3s; -webkit-tap-highlight-color: transparent; }

.app-header{ background:#0f172a; color:white; padding:16px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
.tabs-container{ background:var(--surface); border-bottom:1px solid var(--line); display:flex; overflow-x:auto; position:sticky; top:60px; z-index:90; }
.tab{ padding:16px 20px; font-weight:700; border:none; background:none; color:var(--muted); cursor:pointer; white-space:nowrap; }
.tab.on{ color:var(--brand); border-bottom:3px solid var(--brand); }

.page{ display:none; padding:20px; max-width:1400px; margin:0 auto; }
.page.on{ display:block; }
.card-modern{ background:var(--surface); border-radius:24px; padding:20px; margin-bottom:20px; border:1px solid var(--line); box-shadow:var(--shadow); }

.input-field{ width:100%; padding:12px; border-radius:12px; border:1px solid var(--line); margin-bottom:10px; background:var(--surface); color:var(--text); }
.btn-primary{ background:var(--brand); color:white; border:none; padding:12px 24px; border-radius:999px; font-weight:700; cursor:pointer; transition:0.2s; }
.btn-primary:hover{ background:var(--brand-2);}
.btn-outline{ background:transparent; border:1.5px solid var(--line); padding:8px 16px; border-radius:999px; cursor:pointer; color:var(--text); }

table{ width:100%; border-collapse:collapse; margin-top:10px; }
th{ text-align:left; padding:12px; background:var(--surface-2); font-size:0.8rem; color:var(--muted); }
td{ padding:12px; border-bottom:1px solid var(--line); }

#splash{ position:fixed; inset:0; background:#020617; z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity .4s; }
#splash.hide{ opacity:0; pointer-events:none; }

.login-overlay{ position:fixed; inset:0; background:#020617; z-index:10001; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px; overflow-y:auto; padding:20px; }
.login-card{ max-width:450px; width:100%; background:var(--surface); border-radius:32px; padding:24px; text-align:center; }

.role-select{ display:flex; gap:12px; margin-bottom:25px; }
.role-btn{ flex:1; padding:12px; border-radius:40px; background:var(--surface-2); border:1px solid var(--line); cursor:pointer; font-weight:600; font-size:16px; }
.role-btn.active{ background:var(--brand); color:white; border-color:var(--brand); }

.staff-select-container{ margin:20px 0; text-align:left; }
.staff-select-container label{ display:block; margin-bottom:8px; font-weight:600; color:var(--text); }
.staff-select{ width:100%; padding:14px; border-radius:16px; border:1px solid var(--line); background:var(--surface); font-size:16px; cursor:pointer; }

.pin-section{ margin:20px 0; }
.pin-input-wrapper{ display:flex; gap:10px; align-items:center; justify-content:center; margin-bottom:15px; }
.pin-field{ width:60px; height:60px; text-align:center; font-size:28px; font-weight:bold; border:2px solid var(--line); border-radius:16px; background:var(--surface); color:var(--text); pointer-events: none; touch-action: manipulation; }

.pin-numpad{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:15px; }
.numpad-btn{ background:var(--surface-2); border:1px solid var(--line); padding:16px; font-size:22px; font-weight:bold; border-radius:16px; cursor:pointer; transition:0.1s; touch-action: manipulation; }
.numpad-btn:active{ transform:scale(0.95); background:var(--brand); color:white; }
.numpad-btn.clear{ background:#64748b; color:white; }

.login-error{ color:#e11d48; margin-top:12px; font-size:14px; min-height:40px; }

.avail-grid{ display:flex; flex-direction:column; gap:12px; margin-top:16px; }
.avail-day-row{ display:flex; flex-wrap:wrap; align-items:center; gap:12px; padding:12px; background:var(--surface-2); border-radius:20px; border:1px solid var(--line);}
.day-label{ width:70px; font-weight:700; }
.time-range{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.time-range input{ width:100px; padding:8px; border-radius:12px; border:1px solid var(--line); background:var(--surface); color:var(--text); }
.toggle-switch{ display:flex; align-items:center; gap:10px; margin-left:auto; }
.switch{ position:relative; display:inline-block; width:52px; height:26px; }
.switch input{ opacity:0; width:0; height:0; }
.slider{ position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background-color:#ccc; transition:.3s; border-radius:34px; }
.slider:before{ position:absolute; content:""; height:20px; width:20px; left:3px; bottom:3px; background-color:white; transition:.3s; border-radius:50%; }
input:checked + .slider { background-color:var(--brand); }
input:checked + .slider:before { transform:translateX(26px); }
.avail-badge{ font-size:12px; padding:4px 8px; border-radius:40px; background:#e2e8f0; color:#0f172a; }

.inventory-row{ display:flex; gap:12px; align-items:center; margin-bottom:12px; flex-wrap:wrap; border-bottom:1px solid var(--line); padding-bottom:8px; }
.inventory-name{ flex:2; font-weight:500; }
.inventory-have{ width:100px; }
.inventory-need{ width:100px; }

@media (max-width: 600px) {
    .page{ padding:12px; }
    .card-modern{ padding:16px; }
    .pin-field{ width:50px; height:50px; font-size:24px; }
    .numpad-btn{ padding:14px; font-size:20px; }
    .avail-day-row{ flex-direction: column; align-items: stretch; }
    .day-label{ width:100%; }
    .toggle-switch{ margin-left:0; justify-content: space-between; }
    .time-range{ justify-content: center; }
}
</style>
</head>
<body>

<div id="splash">
    <h1 style="color:white; font-weight:900;">KFC 1416</h1>
    <p style="color:#94a3b8;">Loading Staff Portal...</p>
    <div style="margin-top:20px;"><i class="fas fa-spinner fa-pulse" style="color:white; font-size:30px;"></i></div>
</div>

<div id="globalLoginScreen" class="login-overlay" style="display:none;">
    <div class="login-card">
        <h2><i class="fas fa-store"></i> KFC 1416 Access</h2>
        <div class="role-select">
            <button class="role-btn active" id="roleStaffBtn">👥 Staff Login</button>
            <button class="role-btn" id="roleManagerBtn">👑 Manager Login</button>
        </div>
        
        <div id="staffLoginView">
            <div class="staff-select-container">
                <label><i class="fas fa-user"></i> Select Your Name</label>
                <select id="staffNameSelect" class="staff-select">
                    <option value="">-- Choose your name --</option>
                </select>
            </div>
            <div class="pin-section">
                <label><i class="fas fa-lock"></i> Enter Your PIN</label>
                <div class="pin-input-wrapper">
                    <input type="text" inputmode="none" readonly class="pin-field" id="pin1">
                    <input type="text" inputmode="none" readonly class="pin-field" id="pin2">
                    <input type="text" inputmode="none" readonly class="pin-field" id="pin3">
                    <input type="text" inputmode="none" readonly class="pin-field" id="pin4">
                </div>
                <div class="pin-numpad" id="staffNumpad">
                    <button class="numpad-btn" data-digit="1">1</button>
                    <button class="numpad-btn" data-digit="2">2</button>
                    <button class="numpad-btn" data-digit="3">3</button>
                    <button class="numpad-btn" data-digit="4">4</button>
                    <button class="numpad-btn" data-digit="5">5</button>
                    <button class="numpad-btn" data-digit="6">6</button>
                    <button class="numpad-btn" data-digit="7">7</button>
                    <button class="numpad-btn" data-digit="8">8</button>
                    <button class="numpad-btn" data-digit="9">9</button>
                    <button class="numpad-btn" data-digit="0">0</button>
                    <button class="numpad-btn clear" id="staffClearBtn">⌫ Clear</button>
                    <button class="numpad-btn" id="staffEnterBtn" style="background:var(--brand); color:white;">✓ Enter</button>
                </div>
            </div>
        </div>
        
        <div id="managerLoginView" style="display:none;">
            <div class="pin-section">
                <label><i class="fas fa-lock"></i> Manager Access Code</label>
                <div class="pin-input-wrapper">
                    <input type="text" inputmode="none" readonly class="pin-field" id="mgrPin1">
                    <input type="text" inputmode="none" readonly class="pin-field" id="mgrPin2">
                    <input type="text" inputmode="none" readonly class="pin-field" id="mgrPin3">
                    <input type="text" inputmode="none" readonly class="pin-field" id="mgrPin4">
                </div>
                <div class="pin-numpad" id="managerNumpad">
                    <button class="numpad-btn" data-digit="1">1</button>
                    <button class="numpad-btn" data-digit="2">2</button>
                    <button class="numpad-btn" data-digit="3">3</button>
                    <button class="numpad-btn" data-digit="4">4</button>
                    <button class="numpad-btn" data-digit="5">5</button>
                    <button class="numpad-btn" data-digit="6">6</button>
                    <button class="numpad-btn" data-digit="7">7</button>
                    <button class="numpad-btn" data-digit="8">8</button>
                    <button class="numpad-btn" data-digit="9">9</button>
                    <button class="numpad-btn" data-digit="0">0</button>
                    <button class="numpad-btn clear" id="mgrClearBtn">⌫ Clear</button>
                    <button class="numpad-btn" id="mgrEnterBtn" style="background:var(--brand); color:white;">✓ Login</button>
                </div>
            </div>
        </div>
        
        <div id="loginError" class="login-error"></div>
    </div>
</div>

<div id="staffPortal" style="display:none;">
    <div class="app-header">
        <span><i class="fas fa-user-clock"></i> Staff Portal</span>
        <button class="btn-outline" style="color:white;" id="staffLogoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
    <div style="padding:20px; max-width:800px; margin:0 auto;">
        <div class="card-modern">
            <h3>Hello, <span id="staffNameDisplay"></span> 👋</h3>
            <p>Set your weekly availability. Your manager will see your schedule.</p>
            <div id="staffAvailabilityEditor"></div>
            <button class="btn-primary" style="width:100%; margin-top:20px;" id="saveStaffAvailabilityBtn">Save My Availability</button>
            <div id="staffPortalMsg" style="margin-top:15px;"></div>
        </div>
    </div>
</div>

<div id="managerApp" style="display:none;">
    <div class="app-header">
        <span>KFC 1416 Manager Hub</span>
        <button class="btn-outline" style="color:white;" id="themeToggleBtn"><i class="fas fa-moon"></i> Theme</button>
        <button class="btn-outline" style="color:white; margin-left:8px;" id="managerLogoutBtn"><i class="fas fa-sign-out-alt"></i> Exit</button>
    </div>
    <div class="tabs-container">
        <button class="tab on" data-tab="team">Team & PINs</button>
        <button class="tab" data-tab="sched">Schedule</button>
        <button class="tab" data-tab="inv">Inventory</button>
        <button class="tab" data-tab="import">Import Staff</button>
    </div>

    <div class="page on" id="pg-team">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px;">
            <h3>Roster & PIN Management</h3>
            <button class="btn-primary" id="addEmpBtn">+ Add Employee</button>
        </div>
        <div id="teamGrid"></div>
    </div>

    <div class="page" id="pg-sched">
        <div class="card-modern">
            <div style="display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;">
                <input type="date" id="wkStart" class="input-field" style="width:auto;">
                <button class="btn-primary" id="exportPdfBtn">Export PDF</button>
                <button class="btn-primary" id="refreshBtn" style="background:#2c3e66;">⟳ Refresh</button>
            </div>
            <div id="schedOut" style="overflow-x:auto;"></div>
        </div>
    </div>

    <div class="page" id="pg-inv">
        <div id="invContent"></div>
        <button class="btn-primary" style="margin-top:20px;" id="saveInventoryBtn">Save All Inventory Changes</button>
    </div>

    <div class="page" id="pg-import">
        <div class="card-modern">
            <h3>Detect Employees from Text</h3>
            <textarea id="importText" class="input-field" style="height:200px;" placeholder="Paste names like 'Bouhoula, Mohamed Hedi' ..."></textarea>
            <button class="btn-primary" id="scanImportBtn">Scan & Add Staff (default PIN 0000)</button>
            <div id="importResult" style="margin-top:15px;"></div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBF3T4E6ckYGzaL28YKMMVz9PRoJ_57pWA",
    authDomain: "ottawa-arab-deals.firebaseapp.com",
    projectId: "ottawa-arab-deals",
    databaseURL: "https://ottawa-arab-deals-default-rtdb.firebaseio.com",
    storageBucket: "ottawa-arab-deals.firebasestorage.app",
    messagingSenderId: "271070834694",
    appId: "1:271070834694:web:df94994328a8e503cdd387"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

const FULL_INVENTORY = {
    freezer: [ { name: "Fries", have: "7", need: "11" }, { name: "Hot wings", have: "7", need: "0" }, { name: "Popcorn", have: "4", need: "6" }, { name: "Onion rings", have: "1", need: "3" }, { name: "Buns", have: "3", need: "3" }, { name: "Slides", have: "1.5", need: "1" }, { name: "Cheese curd", have: "2", need: "0" }, { name: "Tortillas 10.25", have: "0.5", need: "1" }, { name: "zinger", have: "0", need: "1" }, { name: "Big crunch", have: "1.5", need: "0" } ],
    kitchen: [ { name: "Flour", have: "1", need: "2" }, { name: "Oil", have: "3", need: "5" } ],
    coles: [ { name: "Macaroni", have: "2", need: "1" }, { name: "Coleslaw", have: "2", need: "1" }, { name: "Mayo", have: "1", need: "0" }, { name: "SP Mayo", have: "0", need: "0" }, { name: "Pepper Mayo", have: "1", need: "0" }, { name: "Cheese", have: "1", need: "0" } ],
    drinks: [ { name: "2L drinks", have: "0", need: "0" }, { name: "500mL Pepsi", have: "0", need: "0" }, { name: "500mL Diet Pepsi", have: "0", need: "0" }, { name: "500mL 7up", have: "0", need: "0" }, { name: "500ml ice tea", have: "0", need: "0" }, { name: "355 ml pepsi", have: "0", need: "0" }, { name: "355 ml pepsi diet", have: "0", need: "0" } ],
    packing: [ { name: "Gloves (box)", have: "5", need: "2" }, { name: "Boxes No. 1", have: "0", need: "Yes" }, { name: "Boxes No. 2", have: "0", need: "Yes" }, { name: "Boxes No. 3", have: "0", need: "Yes" }, { name: "16 large side container", have: "0", need: "Yes" }, { name: "16 large side Lids", have: "0", need: "Yes" }, { name: "Small side Container", have: "0", need: "Yes" }, { name: "Small side Lids", have: "0", need: "Yes" } ],
    bib: [ { name: "Super charger syrup", have: "0", need: "Yes" } ]
};

const DEFAULT_STAFF_NAMES = ["Bouhoula, Mohamed Hedi","Adedunye, Damiola","Appidi, Nandakishore","Hashim, Agil","Legault-Agil, Alyza","Aghwach, Adam","Belarbii, Anes","Shaheen, Ghazala","Tiwari, Balveer","Gilotra, Arjun"];

let D = { employees: [], inventory: null, weekStart: new Date().toISOString().split('T')[0] };
let currentStaffId = null;
let staffPinDigits = ['', '', '', ''];
let mgrPinDigits = ['', '', '', ''];
let currentRole = 'staff';
let isDataLoaded = false;

// PIN Display Functions
function updateStaffPinDisplay() {
    for(let i=0; i<4; i++) {
        const field = document.getElementById(`pin${i+1}`);
        if(field) field.value = staffPinDigits[i];
    }
}

function updateMgrPinDisplay() {
    for(let i=0; i<4; i++) {
        const field = document.getElementById(`mgrPin${i+1}`);
        if(field) field.value = mgrPinDigits[i];
    }
}

function appendStaffDigit(digit) {
    for(let i=0; i<4; i++) {
        if(staffPinDigits[i] === '') {
            staffPinDigits[i] = digit;
            updateStaffPinDisplay();
            break;
        }
    }
}

function clearStaffPin() {
    staffPinDigits = ['', '', '', ''];
    updateStaffPinDisplay();
}

function appendMgrDigit(digit) {
    for(let i=0; i<4; i++) {
        if(mgrPinDigits[i] === '') {
            mgrPinDigits[i] = digit;
            updateMgrPinDisplay();
            break;
        }
    }
}

function clearMgrPin() {
    mgrPinDigits = ['', '', '', ''];
    updateMgrPinDisplay();
}

function getStaffPin() { return staffPinDigits.join(''); }
function getMgrPin() { return mgrPinDigits.join(''); }

// Firebase Functions
function saveToFirebase() {
    if(D && D.employees) {
        db.ref('kfc_data').set(D).then(() => {
            console.log("Data saved to Firebase successfully");
        }).catch(error => {
            console.error("Error saving to Firebase:", error);
        });
    }
}

function loadFromFirebase() {
    return db.ref('kfc_data').once('value').then((snap) => {
        if(snap.val()) {
            D = snap.val();
            // Ensure inventory exists
            if(!D.inventory) D.inventory = JSON.parse(JSON.stringify(FULL_INVENTORY));
            // Ensure each employee has proper structure
            if(D.employees) {
                D.employees.forEach(e => { 
                    if(!e.pin) e.pin = '0000'; 
                    if(!e.avail || e.avail.length !== 7) {
                        e.avail = DAYS.map(()=>({on:false, s:'09:00', e:'17:00'}));
                    }
                });
            } else {
                D.employees = [];
            }
            return true;
        } else {
            // First time - initialize with default data
            D.employees = DEFAULT_STAFF_NAMES.map((name,i)=> ({ 
                id: `emp_${i}_${Date.now()}`, 
                name, 
                position: 'Staff', 
                pin: '0000', 
                avail: DAYS.map(()=>({on:false, s:'09:00', e:'17:00'}))
            }));
            D.inventory = JSON.parse(JSON.stringify(FULL_INVENTORY));
            saveToFirebase();
            return true;
        }
    });
}

// Real-time listener for changes
function listenForChanges() {
    db.ref('kfc_data').on('value', (snap) => {
        if(snap.val()) {
            const newData = snap.val();
            D.employees = newData.employees || [];
            D.inventory = newData.inventory || JSON.parse(JSON.stringify(FULL_INVENTORY));
            D.weekStart = newData.weekStart || new Date().toISOString().split('T')[0];
            
            // Ensure proper structure
            D.employees.forEach(e => { 
                if(!e.pin) e.pin = '0000'; 
                if(!e.avail || e.avail.length !== 7) {
                    e.avail = DAYS.map(()=>({on:false, s:'09:00', e:'17:00'}));
                }
            });
            
            updateStaffDropdown();
            if(document.getElementById('managerApp').style.display === 'block') {
                refreshUI();
            }
        }
    });
}

function updateStaffDropdown() {
    const select = document.getElementById('staffNameSelect');
    if(select && D.employees) {
        const currentValue = select.value;
        select.innerHTML = '<option value="">-- Choose your name --</option>';
        D.employees.forEach(emp => {
            const option = document.createElement('option');
            option.value = emp.id;
            option.textContent = emp.name;
            select.appendChild(option);
        });
        if(currentValue && D.employees.find(e => e.id === currentValue)) {
            select.value = currentValue;
        }
    }
}

function refreshUI() { 
    if(document.getElementById('managerApp').style.display === 'block') { 
        renderTeam(); 
        renderInventory(); 
        buildSched(); 
    } 
}

// Login Functions
function verifyStaffLogin() {
    const selectedId = document.getElementById('staffNameSelect').value;
    if(!selectedId) {
        document.getElementById('loginError').innerHTML = '⚠️ Please select your name first.';
        return;
    }
    const pin = getStaffPin();
    if(pin.length !== 4) {
        document.getElementById('loginError').innerHTML = '⚠️ Please enter 4-digit PIN.';
        return;
    }
    const employee = D.employees.find(e => e.id === selectedId);
    if(employee && employee.pin === pin) {
        currentStaffId = employee.id;
        document.getElementById('staffNameDisplay').innerHTML = employee.name;
        document.getElementById('globalLoginScreen').style.display = 'none';
        document.getElementById('staffPortal').style.display = 'block';
        loadStaffAvailabilityUI(employee);
        document.getElementById('loginError').innerHTML = '';
        clearStaffPin();
    } else {
        document.getElementById('loginError').innerHTML = '❌ Invalid PIN. Default is 0000. Contact manager.';
        clearStaffPin();
    }
}

function verifyManagerLogin() {
    const pin = getMgrPin();
    if(pin === '1416') {
        document.getElementById('globalLoginScreen').style.display = 'none';
        document.getElementById('managerApp').style.display = 'block';
        refreshUI();
        document.getElementById('loginError').innerHTML = '';
        clearMgrPin();
    } else {
        document.getElementById('loginError').innerHTML = '❌ Invalid Manager Code.';
        clearMgrPin();
    }
}

function loadStaffAvailabilityUI(employee) {
    const editorDiv = document.getElementById('staffAvailabilityEditor');
    let html = `<div class="avail-grid">`;
    DAYS.forEach((day, idx) => {
        const slot = employee.avail[idx];
        html += `<div class="avail-day-row">
            <div class="day-label"><strong>${day}</strong></div>
            <div class="time-range">
                <input type="time" id="staff_start_${idx}" value="${slot.s}" step="900">
                <span>➔</span>
                <input type="time" id="staff_end_${idx}" value="${slot.e}" step="900">
            </div>
            <div class="toggle-switch">
                <label class="switch">
                    <input type="checkbox" class="staff-toggle" data-dayidx="${idx}" ${slot.on ? 'checked' : ''}>
                    <span class="slider"></span>
                </label>
                <span class="avail-badge">${slot.on ? 'Available' : 'Unavailable'}</span>
            </div>
        </div>`;
    });
    html += `</div>`;
    editorDiv.innerHTML = html;
    document.querySelectorAll('.staff-toggle').forEach(toggle => {
        toggle.addEventListener('change', function() {
            const badge = this.closest('.toggle-switch')?.querySelector('.avail-badge');
            if(badge) badge.textContent = this.checked ? 'Available' : 'Unavailable';
        });
    });
}

function saveStaffAvailabilityFromPortal() {
    if(!currentStaffId) return;
    const employeeIndex = D.employees.findIndex(e => e.id === currentStaffId);
    if(employeeIndex === -1) return;
    
    for(let i=0; i<DAYS.length; i++) {
        const start = document.getElementById(`staff_start_${i}`);
        const end = document.getElementById(`staff_end_${i}`);
        const toggle = document.querySelector(`.staff-toggle[data-dayidx="${i}"]`);
        if(start && end && toggle) {
            D.employees[employeeIndex].avail[i] = { on: toggle.checked, s: start.value, e: end.value };
        }
    }
    saveToFirebase();
    const msgDiv = document.getElementById('staffPortalMsg');
    msgDiv.innerHTML = '✅ Availability saved! Manager will see updates.';
    msgDiv.style.color = '#10b981';
    setTimeout(() => msgDiv.innerHTML = '', 2500);
}

function renderTeam() {
    const container = document.getElementById('teamGrid');
    if(!container) return;
    container.innerHTML = '<div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(340px,1fr)); gap:15px;">';
    D.employees.forEach(emp => {
        const availCount = emp.avail.filter(a=>a.on).length;
        container.innerHTML += `
            <div class="card-modern">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong><i class="fas fa-user"></i> ${emp.name}</strong>
                    <span class="avail-badge">📅 ${availCount}/7</span>
                </div>
                <div style="margin:8px 0; display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                    <span>🔐 PIN:</span>
                    <input type="text" id="pin_${emp.id}" value="${emp.pin || '0000'}" maxlength="4" style="width:80px; text-align:center; border-radius:20px; border:1px solid var(--line); padding:6px;">
                    <button class="btn-outline" style="padding:4px 12px;" onclick="window.updatePinFor('${emp.id}')">Set PIN</button>
                </div>
                <div style="font-size:12px; margin-top:8px;">${emp.avail.map((a,i)=> a.on ? `<span style="background:var(--brand); color:white; padding:2px 6px; border-radius:30px; margin:2px; display:inline-block;">${DAYS[i]} ${a.s}-${a.e}</span>` : '').join('') || 'No availability'}</div>
            </div>`;
    });
    container.innerHTML += '</div>';
}

window.updatePinFor = function(empId) {
    const inputField = document.getElementById(`pin_${empId}`);
    const newPin = inputField.value.trim();
    if(/^\d{4}$/.test(newPin)) {
        const empIndex = D.employees.findIndex(e => e.id === empId);
        if(empIndex !== -1) { 
            D.employees[empIndex].pin = newPin; 
            saveToFirebase(); 
            alert(`PIN for ${D.employees[empIndex].name} updated to ${newPin}`); 
        }
    } else { alert('PIN must be exactly 4 digits.'); }
};

function openAddEmp() {
    const name = prompt("Employee full name (Last, First):");
    if(name && name.trim()) {
        if(D.employees.find(e=>e.name.toLowerCase()===name.trim().toLowerCase())) alert("Already exists.");
        else {
            D.employees.push({
                id: 'e'+Date.now()+Math.random(),
                name: name.trim(),
                position: 'Staff',
                pin: '0000',
                avail: DAYS.map(()=>({on:false, s:'10:00', e:'18:00'}))
            });
            saveToFirebase();
            updateStaffDropdown();
        }
    }
}

function autoDetectEmployees() {
    const text = document.getElementById('importText').value;
    const pattern = /([A-Za-z]+(?:[-\s][A-Za-z]+)*,\s*[A-Za-z]+(?:[\s][A-Za-z]+)*)/g;
    let found = [], match;
    while((match = pattern.exec(text)) !== null) {
        let name = match[1].trim();
        if(name && !D.employees.find(e => e.name.toLowerCase() === name.toLowerCase())) {
            D.employees.push({ id:'e'+Date.now()+Math.random(), name, position:'Staff', pin:'0000', avail: DAYS.map(()=>({on:false, s:'09:00', e:'17:00'})) });
            found.push(name);
        }
    }
    if(found.length) { saveToFirebase(); updateStaffDropdown(); }
    document.getElementById('importResult').innerHTML = found.length ? `✅ Added: ${found.join(', ')} with PIN 0000` : "No new names.";
}

function renderInventory() {
    let html = '<div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(380px,1fr)); gap:20px;">';
    for(let cat in D.inventory) {
        html += `<div class="card-modern"><h3>${cat.toUpperCase()}</h3>`;
        D.inventory[cat].forEach((item, idx) => {
            html += `<div class="inventory-row">
                <span class="inventory-name">${item.name}</span>
                <input class="input-field inventory-have" value="${item.have}" onchange="D.inventory['${cat}'][${idx}].have=this.value">
                <input class="input-field inventory-need" value="${item.need}" onchange="D.inventory['${cat}'][${idx}].need=this.value">
            </div>`;
        });
        html += `</div>`;
    }
    html += '</div>';
    document.getElementById('invContent').innerHTML = html;
}

function buildSched() {
    let html = '<div style="overflow-x:auto;"><table style="min-width:800px; width:100%;"><thead><tr><th>Staff</th>'+DAYS.map(d=>`<th>${d}</th>`).join('')+'</tr></thead><tbody>';
    D.employees.forEach(e => {
        html += `<tr><td style="font-weight:600;">${e.name}</td>`;
        e.avail.forEach(a => html += `<td style="background:${a.on ? '#dcfce7' : '#ffe4e2'};">${a.on ? `${a.s}–${a.e}` : '—'}</td>`);
        html += `</tr>`;
    });
    html += `</tbody><table></div>`;
    document.getElementById('schedOut').innerHTML = html;
}

function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'pt');
    doc.text(`KFC Schedule - ${D.weekStart}`, 40, 40);
    const head = [['Staff', ...DAYS]];
    const body = D.employees.map(e => [e.name, ...e.avail.map(a => a.on ? `${a.s}-${a.e}` : 'OFF')]);
    doc.autoTable({ head, body, startY: 60, headStyles: { fillColor: [225,29,72] } });
    doc.save(`schedule_${D.weekStart}.pdf`);
}

function toggleTheme() { document.body.classList.toggle('dark'); }
function logout() { 
    document.getElementById('globalLoginScreen').style.display = 'flex'; 
    document.getElementById('managerApp').style.display = 'none'; 
    document.getElementById('staffPortal').style.display = 'none'; 
    clearStaffPin(); clearMgrPin();
    document.getElementById('loginError').innerHTML = ''; 
}

function setRole(role) {
    currentRole = role;
    const staffBtn = document.getElementById('roleStaffBtn');
    const managerBtn = document.getElementById('roleManagerBtn');
    const staffView = document.getElementById('staffLoginView');
    const managerView = document.getElementById('managerLoginView');
    if(role === 'staff') {
        staffBtn.classList.add('active');
        managerBtn.classList.remove('active');
        staffView.style.display = 'block';
        managerView.style.display = 'none';
    } else {
        staffBtn.classList.remove('active');
        managerBtn.classList.add('active');
        staffView.style.display = 'none';
        managerView.style.display = 'block';
    }
    document.getElementById('loginError').innerHTML = '';
    clearStaffPin(); clearMgrPin();
}

function go(tabName) {
    document.querySelectorAll('.page').forEach(x => x.classList.remove('on'));
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
    document.getElementById(`pg-${tabName}`).classList.add('on');
    const activeTab = Array.from(document.querySelectorAll('.tab')).find(t => t.getAttribute('data-tab') === tabName);
    if(activeTab) activeTab.classList.add('on');
}

// Initialize App
async function initApp() {
    await loadFromFirebase();
    listenForChanges();
    setTimeout(() => {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('globalLoginScreen').style.display = 'flex';
        updateStaffDropdown();
    }, 1000);
}

// Event binding
document.getElementById('roleStaffBtn').onclick = () => setRole('staff');
document.getElementById('roleManagerBtn').onclick = () => setRole('manager');
document.getElementById('staffLogoutBtn').onclick = () => logout();
document.getElementById('managerLogoutBtn').onclick = () => logout();
document.getElementById('themeToggleBtn').onclick = () => toggleTheme();
document.getElementById('addEmpBtn').onclick = () => openAddEmp();
document.getElementById('exportPdfBtn').onclick = () => exportPDF();
document.getElementById('refreshBtn').onclick = () => refreshUI();
document.getElementById('saveInventoryBtn').onclick = () => saveToFirebase();
document.getElementById('scanImportBtn').onclick = () => autoDetectEmployees();
document.getElementById('saveStaffAvailabilityBtn').onclick = () => saveStaffAvailabilityFromPortal();
document.getElementById('staffClearBtn').onclick = () => clearStaffPin();
document.getElementById('mgrClearBtn').onclick = () => clearMgrPin();
document.getElementById('staffEnterBtn').onclick = () => verifyStaffLogin();
document.getElementById('mgrEnterBtn').onclick = () => verifyManagerLogin();

document.querySelectorAll('#staffNumpad .numpad-btn[data-digit]').forEach(btn => {
    btn.onclick = () => appendStaffDigit(btn.getAttribute('data-digit'));
});
document.querySelectorAll('#managerNumpad .numpad-btn[data-digit]').forEach(btn => {
    btn.onclick = () => appendMgrDigit(btn.getAttribute('data-digit'));
});

document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => { const tabName = tab.getAttribute('data-tab'); if(tabName) go(tabName); };
});

initApp();
</script>
</body>
</html>
