  <!-- Firebase v9 modular via ES module (gstatic → esm.sh fallback) -->
  <script type="module">
    async function loadFirebase() {
      const VERS = "10.7.1";
      const bases = [
        `https://www.gstatic.com/firebasejs/${VERS}/`,
        `https://esm.sh/firebase@${VERS}/`,
      ];
      let FA, FF, initializeApp;
      for (const base of bases) {
        try {
          const suffix = base.includes("esm.sh") ? "" : "";
          const appMod  = await import(base + (base.includes("esm.sh") ? "app" : "firebase-app.js"));
          const authMod = await import(base + (base.includes("esm.sh") ? "auth" : "firebase-auth.js"));
          const fsMod   = await import(base + (base.includes("esm.sh") ? "firestore" : "firebase-firestore.js"));
          initializeApp = appMod.initializeApp;
          FA = authMod; FF = fsMod;
          break;
        } catch(e) { console.warn("Firebase CDN failed:", base, e.message); }
      }
      if (!initializeApp) {
        document.dispatchEvent(new CustomEvent("firebase-error", {detail:"Could not load Firebase from any CDN."}));
        return;
      }
      const cfg = {
        apiKey:"AIzaSyBdujq0sn6pQGZktiAyaeTntGlfQ8MYVP4",
        authDomain:"ottawa-deals.firebaseapp.com",
        projectId:"ottawa-deals",
        storageBucket:"ottawa-deals.firebasestorage.app",
        messagingSenderId:"468903353105",
        appId:"1:468903353105:web:864ea92efea5c5c6bc0ab0",
        measurementId:"G-L06FJJ1D5E"
      };
      const app = initializeApp(cfg);
      window._auth = FA.getAuth(app);
      window._db   = FF.getFirestore(app);
      window._FA   = FA;
      window._FF   = FF;
      window._fbReady = true;
      document.dispatchEvent(new Event("firebase-ready"));
    }
    loadFirebase();
  </script>

  class ErrorBoundary extends React.Component {
    constructor(props){ super(props); this.state={hasError:false,error:null}; }
    static getDerivedStateFromError(e){ return {hasError:true,error:e}; }
    componentDidCatch(e,i){ console.error("App error:",e,i); }
    render(){
      if(this.state.hasError) return(

/* ═══════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════ */
function assignWeek(shifts){
  const res=Array(7).fill(null);
  res[5]="family"; res[6]="family";
  for(let i=0;i<5;i++){
    const s=shifts[i];
    if(s==="off_gym") res[i]="gym_off";
    else if(s==="night_gym") res[i]="kfc_gym";
    else if(s==="morning_gym"||s==="afternoon_gym") res[i]="gym_before_shift";
    else if(s==="babysitting") res[i]="babysitting";
    else if(s==="double") res[i]="kfc";
  }
  let gymCount=res.filter(r=>r==="gym_off"||r==="kfc_gym"||r==="gym_before_shift").length;
  if(gymCount<2){
    const cands=[];
    for(let i=0;i<5;i++){
      if(res[i]!==null) continue;
      const s=shifts[i];
      if(s==="off"||s==="night") cands.push(i);
    }
    let g1=-1,g2=-1;
    for(let ci=0;ci<cands.length;ci++){
      if(g1===-1){g1=cands[ci];continue;}
      if(g2===-1&&cands[ci]-g1>=2){g2=cands[ci];break;}
    }
    if(g1===-1&&cands.length>0) g1=cands[0];
    if(g2===-1&&cands.length>1) g2=cands[cands.length-1];
    if(gymCount===0){
      if(g1!==-1){res[g1]=shifts[g1]==="night"?"kfc_gym":"gym1";gymCount++;}
      if(g2!==-1){res[g2]=shifts[g2]==="night"?"kfc_gym":"gym2";gymCount++;}
    } else if(gymCount===1){
      const used=g1!==-1&&res[g1]===null?g1:g2;
      if(used!==-1) res[used]=shifts[used]==="night"?"kfc_gym":"gym2";
    }
  }
  let altCount=0;
  for(let i=0;i<5;i++){
    if(res[i]!==null) continue;
    const s=shifts[i];
    if(s==="night") res[i]="kfc";
    else if(s!=="off") res[i]="kfc";
    else{res[i]=altCount%2===0?"active":"home";altCount++;}
  }
  return res;
}

function getWeekDates(n){
  const now=new Date(),day=now.getDay(),mon=new Date(now);
  mon.setDate(now.getDate()-(day===0?6:day-1)+(n-1)*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function fmtDate(d){return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short"});}
function fmtElapsed(s){
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(h>0) return `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
  return `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}
function exEmoji(name){
  if(name==="Brisk Walk") return "🚶";
  if(name==="Kegel") return "🎯";
  if(name==="Joint Mobility") return "🔄";
  if(name==="Plank"||name==="Side Plank") return "🧘";
  if(name==="Squat"||name==="Bodyweight Squat") return "🦵";
  if(name==="Leg Raise"||name==="Russian Twist") return "🔥";
  if(name==="Push-ups") return "💪";
  return "🏋️";
}

/* ═══════════════════════════════════════════════
   REST TIMER (persistent, no auto-close)
═══════════════════════════════════════════════ */
function RestTimer({seconds,onClose}){
  const [rem,setRem]=useState(seconds);
  const [run,setRun]=useState(true);
  const [done,setDone]=useState(false);
  const intervalRef=useRef(null);

  useEffect(()=>{
    if(run&&rem>0){
      intervalRef.current=setInterval(()=>{
        setRem(r=>{
          if(r<=1){clearInterval(intervalRef.current);setDone(true);setRun(false);return 0;}
          return r-1;
        });
      },1000);
    }
    return()=>clearInterval(intervalRef.current);
  },[run]);

  function toggleRun(){
    clearInterval(intervalRef.current);
    setRun(r=>!r);
  }

  function reset(){
    clearInterval(intervalRef.current);
    setRem(seconds);setRun(true);setDone(false);
  }

  const pct=rem/seconds;
  const R=52,circ=2*Math.PI*R;

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:99999,padding:16}} onClick={e=>e.stopPropagation()}>
      <div style={{background:"#141414",borderRadius:24,padding:30,textAlign:"center",width:"100%",maxWidth:300,border:`1px solid ${done?"#b8d44a33":"#2a2a2a"}`,boxShadow:done?"0 0 40px #b8d44a22":"none",transition:"box-shadow .5s"}}>
        <div style={{fontFamily:FD,fontSize:13,color:C.muted,letterSpacing:3,marginBottom:4}}>REST TIMER</div>
        {done&&<div style={{fontFamily:FD,fontSize:18,color:C.accent,letterSpacing:2,marginBottom:8}} className="timer-pop">✅ GO AGAIN!</div>}

        <div style={{position:"relative",width:130,height:130,margin:"0 auto 20px"}}>
          <svg width="130" height="130" style={{transform:"rotate(-90deg)"}}>
            <circle cx="65" cy="65" r={R} fill="none" stroke="#1e1e1e" strokeWidth="10"/>
            <circle cx="65" cy="65" r={R} fill="none" stroke={done?"#b8d44a":rem<=10?"#f87171":"#b8d44a"}
              strokeWidth="10" strokeDasharray={circ} strokeDashoffset={circ*(1-pct)}
              strokeLinecap="round" style={{transition:"stroke-dashoffset 1s linear,stroke .5s"}}/>
          </svg>
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <div style={{fontFamily:FD,fontSize:52,color:done?"#b8d44a":rem<=10?"#f87171":"#fff",lineHeight:1,transition:"color .5s"}}>{rem}</div>
            <div style={{fontSize:10,color:C.muted,letterSpacing:2}}>SEC</div>
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>
          <button onClick={toggleRun}
            style={{padding:"11px 6px",background:"#1e1e1e",border:"1px solid #333",borderRadius:10,color:"#fff",fontFamily:FD,fontSize:13,cursor:"pointer"}}>
            {run?"⏸":"▶"}
          </button>
          <button onClick={reset}
            style={{padding:"11px 6px",background:"#1e1e1e",border:"1px solid #333",borderRadius:10,color:"#aaa",fontFamily:FD,fontSize:13,cursor:"pointer"}}>
            ↺
          </button>
          <button onClick={onClose}
            style={{padding:"11px 6px",background:"#f8717122",border:"1px solid #f8717155",borderRadius:10,color:"#f87171",fontFamily:FD,fontSize:13,cursor:"pointer"}}>
            ✕
          </button>
        </div>
        <div style={{fontSize:10,color:C.muted,marginTop:10}}>Tap ✕ to close</div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   SESSION TIMER
═══════════════════════════════════════════════ */
function SessionTimer({planColor,label,onClose}){
  const [elapsed,setElapsed]=useState(0);
  const [run,setRun]=useState(true);
  const intervalRef=useRef(null);

  useEffect(()=>{
    if(run){
      intervalRef.current=setInterval(()=>setElapsed(e=>e+1),1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return()=>clearInterval(intervalRef.current);
  },[run]);

function MoeFitness({user,profile:initProfile,onSignOut}){
  const [tab,setTab]=useState("today");
  const [now,setNow]=useState(new Date());
  const [restTimer,setRestTimer]=useState(null);
  const [sessionTimer,setSessionTimer]=useState(null);
  const [showAdmin,setShowAdmin]=useState(false);

  const isAdmin=user.email===ADMIN_EMAIL;

  // Local + Firestore data
  const [appData,setAppData]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("mf_data_"+user.uid))||{};}catch{return{};}
  });
  const [profile,setProfile]=useState(initProfile);

  function persistData(nd){
    setAppData(nd);
    try{localStorage.setItem("mf_data_"+user.uid,JSON.stringify(nd));}catch{}
    // Debounce Firestore save
    fbUpdateDoc("users", user.uid, {appData:nd}).catch(()=>{});
  }

  const weeks=appData.weeks||{};
  const completed=appData.completed||{};
  const missed=appData.missed||{};

  const [week,setWeek]=useState(1);
  const wk=`w${week}`;
  const wd=weeks[wk]||{shifts:Array(7).fill("off"),times:Array(7).fill({start:"",end:""}),assigned:null,saved:false};
  const wDates=getWeekDates(week);
  const todayIdx=(()=>{const d=new Date().getDay();return d===0?6:d-1;})();
  const todayKey=`${wk}_d${todayIdx}`;
  const todayPlan=wd.assigned?PLAN[wd.assigned[todayIdx]]:null;

  const [selDay,setSelDay]=useState(todayIdx);
  const [editShift,setEditShift]=useState(null);
  const [section,setSection]=useState("exercises");
  const [missedModal,setMissedModal]=useState(null);
  const [missedNote,setMissedNote]=useState("");
  const [toast,setToast]=useState(null);
  const [editProf,setEditProf]=useState(false);
  const [profDraft,setProfDraft]=useState({...profile});

  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t);},[]);

  function showToast(msg,color=C.accent){setToast({msg,color});setTimeout(()=>setToast(null),2600);}

  const upWk=(f,v)=>persistData({...appData,weeks:{...weeks,[wk]:{...wd,[f]:v}}});
  const saveWeek=()=>{
    persistData({...appData,weeks:{...weeks,[wk]:{...wd,assigned:assignWeek(wd.shifts),saved:true}}});
    showToast("✅ Week saved & plan aligned!");
  };
  const markDone=i=>{
    const k=`${wk}_d${i}`;
    persistData({...appData,completed:{...completed,[k]:!completed[k]}});
    showToast(completed[k]?"Unmarked":"💪 Workout logged!",completed[k]?C.muted:C.accent);
  };

  const totalDone=Object.keys(completed).filter(k=>k.startsWith(wk)&&completed[k]).length;

        <div style={{fontSize:12,color:"#ccc"}}>{plan.cardio}</div>
      </div>}

        <div style={{fontSize:9,color:"#e879f9",letterSpacing:2,marginBottom:3}}>🎯 KEGEL</div>
        <div style={{fontSize:12,color:"#ccc"}}>{plan.kegel}</div>
      </div>
    </>

      <style>{`body{background:#0a0a0a;}`}</style>

        {/* HEADER */}

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontFamily:FD,fontSize:26,color:C.accent,letterSpacing:3}}>MOE FITNESS</div>
              <div style={{fontSize:9,color:C.muted,letterSpacing:3}}>COMMAND CENTER</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:FD,fontSize:22,color:"#fff",letterSpacing:2}}>{now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</div>

              <div key={l} style={{textAlign:"center"}}>
                <div style={{fontFamily:FD,fontSize:19,color:C.accent,lineHeight:1}}>{v}</div>

              <div style={{fontSize:14}}>{ic}</div><div style={{marginTop:2}}>{lb}</div>
            </button>
          ))}
        </div>

        {/* ══ TODAY ══ */}
        {tab==="today"&&(
          <div style={{padding:16}} className="fade-up">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:13}}>
              <div>
                <div style={{fontFamily:FD,fontSize:25,color:"#fff",letterSpacing:2}}>{now.toLocaleDateString("en-GB",{weekday:"long"})}</div>
                <div style={{fontSize:11,color:C.muted}}>{now.toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"})}</div>
              </div>
              <div style={{width:8,height:8,borderRadius:"50%",background:"#4ade80"}} className="live-dot"/>
            </div>
            {todayPlan?(
              <>
                <DayHeader plan={todayPlan} dKey={todayKey} dayIdx={todayIdx}/>

                  <>
                    <div style={{fontFamily:FD,fontSize:14,color:C.accent,letterSpacing:2,marginBottom:8}}>🔥 CARDIO WARMUP</div>
                    <CardioSection planColor={todayPlan.color}/>
                  </>
                )}
                <div style={{fontFamily:FD,fontSize:15,color:"#fff",letterSpacing:2,marginBottom:9}}>TODAY'S EXERCISES</div>
                <ExList plan={todayPlan}/>
                <div style={{fontFamily:FD,fontSize:15,color:"#fff",letterSpacing:2,marginTop:13,marginBottom:9}}>MEALS</div>

                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <div style={{fontSize:11,color:todayPlan.color,fontWeight:600}}>{k}</div>
                      <div style={{fontSize:10,color:C.dim}}>{t}</div>
                    </div>
                    <div style={{fontSize:12,color:"#ccc",lineHeight:1.6}}>{todayPlan.meals[mk]}</div>
                  </div>
                ))}
              </>
            ):(

                <div style={{fontSize:46,marginBottom:13}}>📅</div>
                <div style={{fontFamily:FD,fontSize:22,color:"#fff",letterSpacing:2,marginBottom:8}}>NO PLAN SET</div>
                <div style={{fontSize:12,color:C.muted,marginBottom:20}}>Set your week schedule first</div>

              </div>
            )}
          </div>
        )}

        {/* ══ SCHEDULE ══ */}
        {tab==="schedule"&&(
          <div style={{padding:16}} className="fade-up">
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>

              <div style={{textAlign:"center"}}>
                <div style={{fontFamily:FD,fontSize:22,color:C.accent,letterSpacing:2}}>WEEK {week}</div>
                <div style={{fontSize:10,color:C.muted}}>{fmtDate(wDates[0])} – {fmtDate(wDates[6])}</div>
              </div>
              <button onClick={()=>setWeek(w=>w+1)} style={{width:36,height:36,borderRadius:"50%",background:"#1a1a1a",border:"1px solid #333",color:"#fff",fontSize:18,cursor:"pointer"}}>›</button>

              <div>🔥 <b style={{color:"#fb923c"}}>Night + Gym</b> → Gym 18:00–20:00 before night shift</div>
              <div>🏋️ <b style={{color:"#22d3ee"}}>+Gym options</b> → Light gym in free window</div>
              <div>👶 <b style={{color:"#f472b6"}}>Babysitting</b> → Home workout instead</div>
            </div>
            <div style={{fontSize:10,color:C.muted,textAlign:"center",marginBottom:10}}>Sat & Sun fixed as family rest days</div>

            {DAYS_FULL.map((day,i)=>{
              const fixed=i>=5,sv=wd.shifts[i];
              const so=SHIFT_OPTS.find(s=>s.value===sv)||SHIFT_OPTS[0];
              const td=wd.times[i]||{start:"",end:""};
              const isOpen=editShift===i;
              return(
                <div key={day} style={{...cs,border:`1px solid ${fixed?"#e879f922":isOpen?C.accent+"44":C.border}`}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:fixed?"default":"pointer"}} onClick={()=>!fixed&&setEditShift(isOpen?null:i)}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{textAlign:"center",minWidth:40}}>
                        <div style={{fontFamily:FD,fontSize:17,color:"#fff"}}>{DAYS_SHORT[i]}</div>
                        <div style={{fontSize:9,color:C.muted}}>{fmtDate(wDates[i])}</div>
                      </div>
                      <div>
                        <div style={{fontSize:13,color:fixed?"#e879f9":so.color,fontWeight:600}}>{fixed?"👨‍👩‍👧 Family Day":`${so.emoji} ${so.label}`}</div>

                        {!fixed&&so.sub&&!td.start&&<div style={{fontSize:9,color:C.dim,marginTop:1}}>{so.sub}</div>}
                      </div>
                    </div>
                    {!fixed&&<div style={{color:C.dim,fontSize:11}}>{isOpen?"▲":"▼"}</div>}
                  </div>
                  {isOpen&&!fixed&&(
                    <div style={{marginTop:11,paddingTop:11,borderTop:`1px solid ${C.border}`}}>
                      <div style={{fontSize:9,color:C.muted,letterSpacing:1,marginBottom:7}}>SHIFT TYPE</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:11}}>
                        {SHIFT_OPTS.map(opt=>(
                          <div key={opt.value} onClick={()=>{const ns=[...wd.shifts];ns[i]=opt.value;upWk("shifts",ns);}}
                            style={{display:"flex",alignItems:"center",gap:7,padding:"8px 10px",background:sv===opt.value?`${opt.color}22`:"#1a1a1a",border:`1px solid ${sv===opt.value?opt.color:"#2a2a2a"}`,borderRadius:9,cursor:"pointer",transition:"all .15s"}}>
                            <span style={{fontSize:14}}>{opt.emoji}</span>
                            <div>
                              <div style={{fontSize:10,color:sv===opt.value?opt.color:"#aaa",fontWeight:600,lineHeight:1.2}}>{opt.label}</div>
                              {opt.sub&&<div style={{fontSize:8,color:C.dim,lineHeight:1.2,marginTop:1}}>{opt.sub}</div>}
                            </div>
                          </div>
                        ))}
                      </div>
                      <div style={{fontSize:9,color:C.muted,letterSpacing:1,marginBottom:7}}>SHIFT TIMES (optional)</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                        {["start","end"].map(t=>(
                          <div key={t}>
                            <div style={{fontSize:9,color:C.dim,marginBottom:3}}>{t==="start"?"Start":"End"}</div>
                            <input type="time" value={td[t]||""} onChange={e=>{const nt=[...wd.times];nt[i]={...nt[i],[t]:e.target.value};upWk("times",nt);}}
                              style={{width:"100%",background:"#1a1a1a",border:"1px solid #333",borderRadius:7,color:"#fff",padding:"8px",fontSize:12}}/>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}

              ⚡ SAVE & ALIGN PLAN
            </button>
            {wd.saved&&<div style={{textAlign:"center",marginTop:8,fontSize:11,color:C.accent}}>✅ Plan aligned for this week</div>}
          </div>
        )}

        {/* ══ PLAN ══ */}
        {tab==="plan"&&(
          <div style={{padding:16}} className="fade-up">
            {!wd.assigned?(
              <div style={{textAlign:"center",padding:"60px 20px"}}>
                <div style={{fontSize:46,marginBottom:13}}>💪</div>
                <div style={{fontFamily:FD,fontSize:22,color:"#fff",letterSpacing:2,marginBottom:8}}>NO PLAN YET</div>
                <button onClick={()=>setTab("schedule")} style={{border:`2px solid ${C.accent}`,background:"transparent",color:C.accent,padding:"11px 26px",borderRadius:10,fontFamily:FD,fontSize:17,letterSpacing:2,cursor:"pointer"}}>GO TO SCHEDULE</button>
              </div>
            ):(
              <>
                <div style={{display:"flex",gap:4,marginBottom:13,overflowX:"auto",paddingBottom:3}}>
                  {DAYS_FULL.map((day,i)=>{
                    const p=PLAN[wd.assigned[i]],dk=`${wk}_d${i}`;
                    const done=completed[dk],miss=missed[dk]?.missed;
                    return(
                      <div key={day} onClick={()=>setSelDay(i)} style={{flex:"0 0 54px",borderRadius:11,padding:"8px 4px",textAlign:"center",cursor:"pointer",background:selDay===i?`${p.color}1a`:"#0d0d0d",border:`1px solid ${selDay===i?p.color+"66":done?C.accent+"44":miss?"#f8717144":"#1e1e1e"}`,transition:"all .2s"}}>
                        <div style={{fontFamily:FD,fontSize:12,color:selDay===i?p.color:"#666",letterSpacing:1}}>{DAYS_SHORT[i]}</div>
                        <div style={{fontSize:15,margin:"3px 0"}}>{TYPE_ICON[p.type]}</div>
                        <div style={{fontSize:7,color:done?C.accent:miss?"#f87171":"#444"}}>{done?"✓":miss?"✗":"·"}</div>
                      </div>
                    );
                  })}
                </div>
                {selPlan&&(
                  <>
                    <DayHeader plan={selPlan} dKey={selKey} dayIdx={selDay}/>
                    {(selPlan.type==="gym"||selPlan.type==="gym_off"||selPlan.type==="work_gym"||selPlan.type==="gym_shift")&&(
                      <>
                        <div style={{fontFamily:FD,fontSize:13,color:C.accent,letterSpacing:2,marginBottom:8}}>🔥 CARDIO WARMUP VIDEOS</div>
                        <CardioSection planColor={selPlan.color}/>
                      </>
                    )}
                    <div style={{display:"flex",gap:4,marginBottom:11}}>
                      {["exercises","schedule","nutrition","supplements"].map(s=>(
                        <button key={s} onClick={()=>setSection(s)}
                          style={{flex:1,padding:"7px 3px",background:section===s?"#1a1a1a":"transparent",border:`1px solid ${section===s?C.accent:C.border}`,borderRadius:8,color:section===s?C.accent:C.muted,fontSize:8,letterSpacing:1,cursor:"pointer",fontFamily:FB,fontWeight:600,transition:"all .2s"}}>
                          {s==="exercises"?"🏋️":s==="schedule"?"⏱️":s==="nutrition"?"🍽️":"💊"}<br/>{s.slice(0,5).toUpperCase()}
                        </button>
                      ))}
                    </div>
                    {section==="exercises"&&<ExList plan={selPlan}/>}
                    {section==="schedule"&&selPlan.schedule.map((s,i)=>(
                      <div key={i} style={{display:"flex",gap:11,alignItems:"flex-start",marginBottom:6}}>
                        <div style={{minWidth:60,fontFamily:FD,fontSize:12,color:selPlan.color,paddingTop:9}}>{s.time}</div>
                        <div style={{flex:1,background:"#0e0e0e",borderRadius:8,padding:"8px 11px",fontSize:12,color:"#ccc"}}>{s.activity}</div>
                      </div>
                    ))}
                    {section==="nutrition"&&(
                      <>
                        {[["🍳 BREAKFAST","breakfast","8:30"],["🍎 SNACK 1","snack1","11:30"],["🍽️ LUNCH","lunch","13:00"],["🥪 SNACK 2","snack2","16:30"],["🌙 DINNER","dinner","19:30"]].map(([k,mk,t])=>(
                          <div key={k} style={cs}>
                            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                              <div style={{fontSize:11,color:selPlan.color,fontWeight:600}}>{k}</div>
                              <div style={{fontSize:9,color:C.dim}}>{t}</div>
                            </div>
                            <div style={{fontSize:12,color:"#ccc",lineHeight:1.6}}>{selPlan.meals[mk]}</div>
                          </div>
                        ))}
                        <div style={{...cs,border:"1px solid #1e3a5f"}}>
                          <div style={{fontSize:11,color:C.blue,fontWeight:600,marginBottom:3}}>💧 WATER</div>
                          <div style={{fontSize:12,color:"#ccc"}}>2–3 litres throughout the day</div>
                        </div>
                      </>
                    )}
                    {section==="supplements"&&(
                      <>
                        {[{name:"Whey Protein",dose:"25–30g",when:"After workout",emoji:"🥛",color:C.accent,note:"Mix with water. Within 30min post-workout."},{name:"Creatine",dose:"5g daily",when:"Post workout",emoji:"⚗️",color:C.blue,note:"No loading phase. Take consistently."},{name:"Omega-3",dose:"2 capsules",when:"With meal",emoji:"🐟",color:"#f59e0b",note:"Reduces inflammation. Supports joints."}].map(s=>(
                          <div key={s.name} style={{...cs,border:`1px solid ${s.color}33`}}>
                            <div style={{display:"flex",gap:9,alignItems:"center",marginBottom:6}}>
                              <div style={{fontSize:22}}>{s.emoji}</div>
                              <div>
                                <div style={{fontSize:13,color:s.color,fontWeight:700}}>{s.name}</div>
                                <div style={{fontSize:10,color:C.muted}}>{s.dose} · {s.when}</div>
                              </div>
                            </div>
                            <div style={{fontSize:11,color:C.dim}}>{s.note}</div>
                          </div>
                        ))}
                        <div style={cs}>
                          <div style={{fontSize:10,color:C.accent,fontWeight:700,marginBottom:6}}>📈 PROGRESSION</div>
                          <div style={{fontSize:12,color:"#aaa",lineHeight:1.8}}>Add 2–5% weight when all reps feel easy.<br/>Last 2–3 reps should be challenging.<br/>Rest 60–90s between sets.</div>
                        </div>
                      </>
                    )}
                  </>
                )}
              </>
            )}
          </div>
        )}

        {/* ══ PROGRESS ══ */}
        {tab==="progress"&&(
          <div style={{padding:16}} className="fade-up">
            <div style={{fontFamily:FD,fontSize:23,color:"#fff",letterSpacing:2,marginBottom:3}}>WEEK {week}</div>
            <div style={{fontSize:11,color:C.muted,marginBottom:16}}>{fmtDate(wDates[0])} – {fmtDate(wDates[6])}</div>
            <div style={{display:"flex",justifyContent:"center",marginBottom:18}}>
              <div style={{position:"relative",width:130,height:130}}>
                <svg width="130" height="130" style={{transform:"rotate(-90deg)"}}>
                  <circle cx="65" cy="65" r="52" fill="none" stroke="#1a1a1a" strokeWidth="9"/>
                  <circle cx="65" cy="65" r="52" fill="none" stroke={C.accent} strokeWidth="9"
                    strokeDasharray={`${2*Math.PI*52}`} strokeDashoffset={`${2*Math.PI*52*(1-totalDone/7)}`}

                </svg>
                <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                  <div style={{fontFamily:FD,fontSize:36,color:C.accent,lineHeight:1}}>{totalDone}</div>
                  <div style={{fontSize:8,color:C.dim,letterSpacing:2}}>/ 7 DAYS</div>
                </div>
              </div>
            </div>
            {wd.assigned?DAYS_FULL.map((day,i)=>{
              const p=PLAN[wd.assigned[i]],dk=`${wk}_d${i}`;
              const done=completed[dk],miss=missed[dk];
              return(
                <div key={day} style={{display:"flex",alignItems:"center",gap:9,padding:"10px 12px",background:C.card,borderRadius:11,border:`1px solid ${C.border}`,marginBottom:6}}>
                  <div style={{width:30,height:30,borderRadius:"50%",background:done?C.accent:miss?.missed?"#f87171":"#1a1a1a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:done?"#000":miss?.missed?"#fff":"#555",flexShrink:0}}>
                    {done?"✓":miss?.missed?"✗":(i+1)}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:done?C.accent:miss?.missed?"#f87171":"#fff"}}>{day}</div>
                    <div style={{fontSize:10,color:C.muted}}>{fmtDate(wDates[i])} · {p.label}</div>
                    {miss?.note&&<div style={{fontSize:10,color:"#f87171",marginTop:1}}>Note: {miss.note}</div>}
                  </div>
                  <div style={{fontSize:9,color:p.color,background:`${p.color}18`,padding:"3px 7px",borderRadius:20}}>{TYPE_ICON[p.type]}</div>
                </div>
              );
            }):<div style={{textAlign:"center",padding:"40px 20px",color:C.dim}}>Save your schedule first</div>}
            <div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
              {[["WEIGHT",`${profile.weight} ${profile.weightUnit||"kg"}`,"Current"],["TARGET",profile.fitnessGoal||profile.target||"Fat Loss","Goal"],["AGE",`${profile.age} yrs`,"Profile"],["HEIGHT",`${profile.height} ${profile.heightUnit||"cm"}`,"Profile"]].map(([l,v,s])=>(
                <div key={l} style={{padding:12,background:"#0d0d0d",borderRadius:10,border:`1px solid ${C.border}`}}>
                  <div style={{fontSize:8,color:C.dim,letterSpacing:2,marginBottom:3}}>{l}</div>
                  <div style={{fontFamily:FD,fontSize:17,color:C.accent,marginBottom:2}}>{v}</div>
                  <div style={{fontSize:9,color:C.muted}}>{s}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ══ PROFILE ══ */}
        {tab==="profile"&&(
          <div style={{padding:16}} className="fade-up">
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{width:72,height:72,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.accent2})`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px",fontFamily:FD,fontSize:32,color:"#000"}}>
                {profile.name?.[0]?.toUpperCase()||"M"}
              </div>
              <div style={{fontFamily:FD,fontSize:23,color:"#fff",letterSpacing:2}}>{profile.name}</div>
              <div style={{fontSize:10,color:C.muted,marginTop:3}}>
                {profile.fitnessLevel||"FITNESS"} ATHLETE · {profile.fitnessGoal||"FITNESS"}
              </div>
            </div>
            {!editProf?(
              <>
                {[["👤 Full Name",profile.name],["🎂 Age",`${profile.age} years`],["⚖️ Weight",`${profile.weight} ${profile.weightUnit||"kg"}`],["📏 Height",`${profile.height} ${profile.heightUnit||"cm"}`],["🎯 Goal",profile.fitnessGoal||profile.target],["🏆 Level",profile.fitnessLevel],["⏰ Best time",profile.preferredTime],["📅 Workout days",profile.workoutDays?.join(", ")],["🩹 Limitations",profile.injuries||"None"]].map(([l,v])=>(
                  <div key={l} style={{...cs,display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
                    <div style={{fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{l}</div>
                    <div style={{fontSize:12,color:"#fff",fontWeight:600,textAlign:"right"}}>{v||"—"}</div>
                  </div>
                ))}
                <button onClick={()=>{setProfDraft({...profile});setEditProf(true);}}
                  style={{width:"100%",padding:"12px",background:`${C.accent}1a`,border:`1px solid ${C.accent}44`,borderRadius:11,color:C.accent,fontFamily:FD,fontSize:16,letterSpacing:2,cursor:"pointer",marginTop:4}}>
                  ✏️ EDIT PROFILE
                </button>
                <button onClick={onSignOut}
                  style={{width:"100%",padding:"12px",background:"#f8717111",border:"1px solid #f8717133",borderRadius:11,color:"#f87171",fontFamily:FD,fontSize:16,letterSpacing:2,cursor:"pointer",marginTop:8}}>
                  🚪 SIGN OUT
                </button>
              </>
            ):(
              <>
                {[["Full Name","name","text"],["Age","age","number"],["Weight","weight","number"],["Height","height","number"]].map(([lb,k,t])=>(
                  <div key={k} style={{marginBottom:12}}>
                    <div style={{fontSize:9,color:C.muted,letterSpacing:1,marginBottom:4}}>{lb.toUpperCase()}</div>
                    <input type={t} value={profDraft[k]||""} onChange={e=>setProfDraft(p=>({...p,[k]:e.target.value}))}
                      style={{width:"100%",background:"#1a1a1a",border:"1px solid #333",borderRadius:8,color:"#fff",padding:"10px 12px",fontSize:12}}/>
                  </div>
                ))}
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:9,color:C.muted,letterSpacing:1,marginBottom:4}}>FITNESS GOAL</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                    {["Weight Loss","Muscle Gain","Endurance","General Fitness"].map(g=>(
                      <button key={g} onClick={()=>setProfDraft(p=>({...p,fitnessGoal:g}))}
                        style={{padding:"9px 6px",background:profDraft.fitnessGoal===g?`${C.accent}22`:C.dim,border:`1px solid ${profDraft.fitnessGoal===g?C.accent:"#333"}`,borderRadius:8,color:profDraft.fitnessGoal===g?C.accent:"#888",fontSize:10,cursor:"pointer",fontFamily:FB}}>
                        {g}
                      </button>
                    ))}
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginTop:8}}>
                  <button onClick={()=>setEditProf(false)} style={{padding:"11px",background:"#1a1a1a",border:"1px solid #333",borderRadius:10,color:"#aaa",fontFamily:FD,fontSize:14,cursor:"pointer"}}>CANCEL</button>
                  <button onClick={saveProf} style={{padding:"11px",background:`linear-gradient(135deg,${C.accent},${C.accent2})`,border:"none",borderRadius:10,color:"#000",fontFamily:FD,fontSize:14,cursor:"pointer",fontWeight:700}}>SAVE</button>
                </div>
              </>
            )}
          </div>
        )}

        {/* BOTTOM NAV (mobile) */}
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#0d0d0d",borderTop:`1px solid ${C.border}`,display:"flex"}}>
          {[["today","⚡","TODAY"],["schedule","📅","SCHED"],["plan","💪","PLAN"],["progress","📊","PROG"],["profile","👤","ME"]].map(([k,ic,lb])=>(
            <button key={k} onClick={()=>setTab(k)}
              style={{flex:1,padding:"8px 4px",background:"none",border:"none",color:tab===k?C.accent:C.dim,cursor:"pointer",borderTop:`2px solid ${tab===k?C.accent:"transparent"}`,transition:"color .2s"}}>
              <div style={{fontSize:15}}>{ic}</div>
              <div style={{fontSize:8,letterSpacing:1,marginTop:1}}>{lb}</div>
            </button>
          ))}
        </div>

        {/* MISSED MODAL */}
        {missedModal!==null&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:1000}} onClick={()=>setMissedModal(null)}>
            <div style={{width:"100%",maxWidth:480,background:"#141414",borderRadius:"18px 18px 0 0",padding:20,border:"1px solid #2a2a2a"}} onClick={e=>e.stopPropagation()}>
              <div style={{fontFamily:FD,fontSize:18,color:"#f87171",letterSpacing:2,marginBottom:3}}>LOG MISSED</div>
              <div style={{fontSize:11,color:C.muted,marginBottom:11}}>{DAYS_FULL[missedModal]}</div>
              <textarea value={missedNote} onChange={e=>setMissedNote(e.target.value)} placeholder="Why? (optional)"
                style={{width:"100%",background:"#1a1a1a",border:"1px solid #333",borderRadius:9,color:"#fff",padding:10,fontSize:12,minHeight:64,resize:"none"}}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginTop:9}}>
                <button onClick={()=>setMissedModal(null)} style={{padding:"11px",background:"#1a1a1a",border:"1px solid #333",borderRadius:9,color:"#aaa",fontFamily:FD,fontSize:13,cursor:"pointer"}}>CANCEL</button>
                <button onClick={()=>logMissed(missedModal,missedNote)} style={{padding:"11px",background:"#f8717122",border:"1px solid #f87171",borderRadius:9,color:"#f87171",fontFamily:FD,fontSize:13,cursor:"pointer"}}>LOG IT</button>
              </div>
            </div>
          </div>
        )}

        {/* TOAST */}
        {toast&&(
          <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:toast.color,color:"#000",padding:"8px 18px",borderRadius:26,fontFamily:FD,fontSize:13,letterSpacing:1,zIndex:9999,fontWeight:700,whiteSpace:"nowrap",pointerEvents:"none"}}>
            {toast.msg}
          </div>
        )}
      </div>
    </>
  );
}

/* ═══════════════════════════════════════════════
   ROOT APP (auth controller)
═══════════════════════════════════════════════ */
function App(){
  const [authState,setAuthState]=useState("loading"); // loading | auth | setup | app
  const [user,setUser]=useState(null);
  const [profile,setProfile]=useState(null);

  useEffect(()=>{
    const unsub=fbOnAuth(async fireUser=>{
      if(!fireUser){setAuthState("auth");return;}
      setUser(fireUser);
      // Check if profile complete
      try{
        const docSnap=await fbGetDoc("users", fireUser.uid);
        if(docSnap.exists()&&docSnap.data().profileComplete){
          const data=docSnap.data();
          setProfile(data);
          // Merge appData if exists
          if(data.appData){
            try{
              const existing=JSON.parse(localStorage.getItem("mf_data_"+fireUser.uid))||{};
              if(!Object.keys(existing).length){
                localStorage.setItem("mf_data_"+fireUser.uid,JSON.stringify(data.appData));
              }
            }catch{}
          }
          setAuthState("app");
        } else {
          setAuthState("setup");
        }
        // Update last login
        fbUpdateDoc("users", fireUser.uid, {lastLogin:serverTimestamp()}).catch(()=>{});
      } catch(e){
        // New user, no doc
        setAuthState("setup");
      }
    });
    return()=>unsub();
  },[]);

  async function handleSignOut(){
    await fbSignOut();
    setUser(null);setProfile(null);setAuthState("auth");
  }

  if(authState==="loading") return <LoadingScreen/>;
  if(authState==="auth")    return <AuthScreen/>;
  if(authState==="setup")   return <ProfileSetup user={user} onComplete={p=>{setProfile(p);setAuthState("app");}}/>;
  return <MoeFitness user={user} profile={profile} onSignOut={handleSignOut}/>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ErrorBoundary><App/></ErrorBoundary>);
} // end startApp()

// ── Wire startup ──
if (window._fbReady) {
  startApp();
} else {
  document.addEventListener("firebase-ready", () => { window._fbReady=true; startApp(); }, {once:true});
  document.addEventListener("firebase-error", () => startApp(), {once:true});
  setTimeout(() => { if(!window._fbReady) startApp(); }, 12000);
}
</script>
</body>
